<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ที่อยู่จัดส่ง</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{--p:#0c4aa6;--pd:#083570;--pl:#e8f0fe;--g:#f5f6f8;--t:#0f172a;--s:#64748b;--gn:#16a34a;--gnl:#dcfce7;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--g);min-height:100vh;}

/* TOPBAR */
.tb{background:linear-gradient(135deg,var(--p),var(--pd));padding:14px 16px;display:flex;align-items:center;gap:12px;}
.tb-back{width:38px;height:38px;border:none;background:rgba(255,255,255,.18);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tb-back svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;}
.tb-title{font-size:17px;font-weight:800;color:#fff;flex:1;}

/* VIEWS */
.view{display:none;}
.view.on{display:block;}

/* === VIEW 1: FORM === */
.form-wrap{padding:16px;}
.fcard{background:#fff;border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.flabel{font-size:12px;font-weight:800;color:var(--s);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.finput{width:100%;height:50px;border:2px solid #eef0f4;border-radius:13px;padding:0 14px;font-size:15px;outline:none;color:var(--t);transition:border .2s;}
.finput:focus{border-color:var(--p);}
.frow{margin-bottom:14px;}
.frow:last-child{margin-bottom:0;}
.map-box{height:200px;border-radius:13px;overflow:hidden;border:2px solid #eef0f4;margin-bottom:8px;}
.map-hint{font-size:12px;color:var(--s);text-align:center;}
.save-btn{width:100%;height:54px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 4px 14px rgba(12,74,166,.25);}

/* === VIEW 2: LIST === */
.list-wrap{padding:12px 16px 100px;}
.addr-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px;cursor:pointer;}
.addr-card:active{opacity:.9;}
.addr-card.selected{border:2px solid var(--p);}
.addr-ico{width:42px;height:42px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.addr-ico svg{width:20px;height:20px;fill:var(--p);}
.addr-ico.def{background:var(--p);}
.addr-ico.def svg{fill:#fff;}
.addr-info{flex:1;min-width:0;}
.addr-name{font-size:14px;font-weight:800;color:var(--t);margin-bottom:2px;}
.addr-text{font-size:12px;color:var(--s);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.addr-actions{display:flex;gap:6px;flex-shrink:0;}
.addr-btn{width:30px;height:30px;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.addr-btn.edit{background:var(--pl);}
.addr-btn.edit svg{fill:var(--p);width:14px;height:14px;}
.addr-btn.del{background:#fee2e2;}
.addr-btn.del svg{fill:#dc2626;width:14px;height:14px;}
.add-card{background:#fff;border:2px dashed #c7d7f0;border-radius:16px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.add-card svg{width:22px;height:22px;fill:var(--p);}
.add-card span{font-size:14px;font-weight:700;color:var(--p);}
.next-fab{position:fixed;bottom:20px;left:16px;right:16px;height:56px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(12,74,166,.35);display:none;}
.empty-box{text-align:center;padding:48px 20px;color:var(--s);}
.empty-box svg{width:48px;height:48px;fill:#cbd5e1;display:block;margin:0 auto 12px;}
.empty-box p{font-size:15px;font-weight:700;color:var(--t);margin-bottom:6px;}
</style>
</head>
<body>

<!-- VIEW 1: FORM (กรอกข้อมูล) -->
<div class="view on" id="viewForm">
  <div class="tb">
    <button class="tb-back" id="formBackBtn"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
    <div class="tb-title" id="formTitle">เพิ่มที่อยู่จัดส่ง</div>
  </div>
  <div class="form-wrap">
    <div class="fcard">
      <div class="frow">
        <div class="flabel">ชื่อ-นามสกุล</div>
        <input class="finput" id="fName" placeholder="ชื่อ-นามสกุลผู้รับ">
      </div>
      <div class="frow">
        <div class="flabel">เบอร์โทร</div>
        <input class="finput" id="fPhone" type="tel" placeholder="08X-XXX-XXXX">
      </div>
      <div class="frow">
        <div class="flabel">ที่อยู่จัดส่ง</div>
        <input class="finput" id="fAddr" placeholder="บ้านเลขที่ ซอย ถนน แขวง เขต">
      </div>
      <div class="frow">
        <div class="flabel">หมายเหตุ (ไม่บังคับ)</div>
        <input class="finput" id="fNote" placeholder="เช่น ตึก A ชั้น 3 ห้อง 305">
      </div>
    </div>
    <div class="fcard">
      <div class="flabel">ปักหมุดตำแหน่ง</div>
      <div class="map-box" id="mapBox"></div>
      <div class="map-hint">กดค้างแผนที่เพื่อย้ายหมุด หรือกด "ใช้ตำแหน่งปัจจุบัน"</div>
      <button onclick="useMyLocation()" style="width:100%;height:42px;margin-top:10px;border:2px solid var(--p);border-radius:12px;background:#fff;color:var(--p);font-size:14px;font-weight:700;cursor:pointer">📍 ใช้ตำแหน่งปัจจุบัน</button>
    </div>
    <button class="save-btn" onclick="saveAddr()">บันทึกที่อยู่</button>
  </div>
</div>

<!-- VIEW 2: LIST (รายการที่อยู่) -->
<div class="view" id="viewList">
  <div class="tb">
    <button class="tb-back" id="listBackBtn"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
    <div class="tb-title">ที่อยู่จัดส่ง</div>
  </div>
  <div class="list-wrap">
    <div id="addrList"></div>
    <div class="add-card" onclick="openForm()">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      <span>เพิ่มที่อยู่ใหม่</span>
    </div>
  </div>
  <button class="next-fab" id="nextFab" onclick="goNext()">เริ่มสั่งอาหาร →</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var addresses = JSON.parse(localStorage.getItem('addresses')||'[]');
var defaultIdx = parseInt(localStorage.getItem('defaultAddress')||'0');
var editIdx = -1;
var map, marker;
var curLat = 13.7563, curLng = 100.5018; // default Bangkok

var isFirstTime = sessionStorage.getItem('newCustomer') === '1';
var backDest = sessionStorage.getItem('addrBack') || 'shops.html';

// ========== INIT ==========
function init(){
  if(addresses.length === 0){
    // ยังไม่มีที่อยู่เลย → เปิดฟอร์มก่อน
    showForm(-1);
    document.getElementById('formBackBtn').style.display = 'none';
  } else {
    // มีที่อยู่แล้ว (เช่น เพิ่งบันทึกจาก register.html) → เปิดหน้า list ทันที
    showList();
  }
}

// ========== VIEWS ==========
function showForm(idx){
  editIdx = idx;
  document.getElementById('viewForm').classList.add('on');
  document.getElementById('viewList').classList.remove('on');
  document.getElementById('formTitle').textContent = idx >= 0 ? 'แก้ไขที่อยู่' : 'เพิ่มที่อยู่จัดส่ง';
  if(idx >= 0){
    var a = addresses[idx];
    document.getElementById('fName').value = a.name||'';
    document.getElementById('fPhone').value = a.phone||'';
    document.getElementById('fAddr').value = a.address||'';
    document.getElementById('fNote').value = a.note||'';
    if(a.lat) curLat=a.lat;
    if(a.lng) curLng=a.lng;
  } else {
    document.getElementById('fName').value = '';
    document.getElementById('fPhone').value = localStorage.getItem('customerPhone')||'';
    document.getElementById('fAddr').value = '';
    document.getElementById('fNote').value = '';
  }
  setTimeout(initMap, 100);
}

function showList(){
  document.getElementById('viewForm').classList.remove('on');
  document.getElementById('viewList').classList.add('on');
  renderList();
  // แสดงปุ่ม ถัดไป ถ้ามีที่อยู่
  document.getElementById('nextFab').style.display = addresses.length > 0 ? 'block' : 'none';
}

// ========== LIST ==========
function renderList(){
  var el = document.getElementById('addrList');
  if(!addresses.length){
    el.innerHTML='<div class="empty-box"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg><p>ยังไม่มีที่อยู่</p><span>กด + เพื่อเพิ่มที่อยู่แรก</span></div>';
    return;
  }
  el.innerHTML = addresses.map(function(a,i){
    var isDef = i === defaultIdx;
    return '<div class="addr-card'+(isDef?' selected':'')+'" onclick="editAddr('+i+')">'
      +'<div class="addr-ico'+(isDef?' def':'')+'" title="ตั้งเป็นที่อยู่หลัก" onclick="event.stopPropagation();setDefault('+i+')"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg></div>'
      +'<div class="addr-info"><div class="addr-name">'+(a.name||'ไม่มีชื่อ')+(isDef?' <span style="font-size:11px;font-weight:800;color:var(--p);background:var(--pl);padding:2px 8px;border-radius:20px;margin-left:4px">ที่อยู่หลัก</span>':'')+'</div><div class="addr-text">'+(a.address||'-')+'</div>'
      +(isDef?'':'<div style="font-size:11px;color:var(--p);font-weight:700;margin-top:4px" onclick="event.stopPropagation();setDefault('+i+')">ตั้งเป็นที่อยู่หลัก</div>')
      +'</div>'
      +'<div class="addr-actions">'
      +'<button class="addr-btn del" onclick="event.stopPropagation();delAddr('+i+')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>'
      +'</div></div>';
  }).join('');
}

function setDefault(i){
  defaultIdx = i;
  localStorage.setItem('defaultAddress', String(i));
  syncCustomerData();
  renderList();
}

function editAddr(i){ showForm(i); }

function delAddr(i){
  if(!confirm('ลบที่อยู่นี้?')) return;
  addresses.splice(i,1);
  if(defaultIdx >= addresses.length) defaultIdx = Math.max(0, addresses.length-1);
  save();
  renderList();
  document.getElementById('nextFab').style.display = addresses.length > 0 ? 'block' : 'none';
}

function openForm(){ showForm(-1); }

function goNext(){
  sessionStorage.removeItem('newCustomer');
  location.href = backDest;
}

// ========== FORM ==========
function saveAddr(){
  var name = document.getElementById('fName').value.trim();
  var phone = document.getElementById('fPhone').value.trim();
  var addr = document.getElementById('fAddr').value.trim();
  var note = document.getElementById('fNote').value.trim();
  if(!name||!addr){ alert('กรุณากรอกชื่อและที่อยู่'); return; }
  var obj = {name:name, phone:phone, address:addr, note:note, lat:curLat, lng:curLng};
  if(editIdx >= 0){
    addresses[editIdx] = obj;
  } else {
    addresses.push(obj);
    defaultIdx = addresses.length - 1;
  }
  save();
  showList();
}

// ========== MAP ==========
function initMap(){
  if(map){ map.remove(); map=null; }
  map = L.map('mapBox').setView([curLat, curLng], 15);
  const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Tiles &copy; Esri',maxZoom:19,maxNativeZoom:19});
  const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19});
  satelliteLayer.addTo(map);
  L.control.layers({'ดาวเทียม':satelliteLayer,'แผนที่ถนน':streetLayer}, null, {position:'topright'}).addTo(map);
  marker = L.marker([curLat, curLng], {draggable:true}).addTo(map);
  marker.on('dragend', function(e){
    curLat = e.target.getLatLng().lat;
    curLng = e.target.getLatLng().lng;
  });
  map.on('click', function(e){
    curLat = e.latlng.lat; curLng = e.latlng.lng;
    marker.setLatLng(e.latlng);
  });
  // บัค "แผนที่ลอย" ตอนเลื่อนหน้า: ต้อง invalidateSize() ซ้ำหลัง container เซ็ตตำแหน่งจริงแล้ว
  setTimeout(function(){ map.invalidateSize(); }, 300);
  window.addEventListener('resize', function(){ if(map) map.invalidateSize(); });
  window.addEventListener('orientationchange', function(){ setTimeout(function(){ if(map) map.invalidateSize(); }, 300); });
}

function useMyLocation(){
  navigator.geolocation.getCurrentPosition(function(p){
    curLat = p.coords.latitude; curLng = p.coords.longitude;
    map.setView([curLat,curLng],16);
    marker.setLatLng([curLat,curLng]);
  }, function(){ alert('ไม่สามารถเข้าถึง GPS ได้'); });
}

// ========== STORAGE ==========
function save(){
  localStorage.setItem('addresses', JSON.stringify(addresses));
  localStorage.setItem('defaultAddress', String(defaultIdx));
  syncCustomerData();
}

function syncCustomerData(){
  var def = addresses[defaultIdx]||addresses[0];
  var phone = localStorage.getItem('customerPhone')||'';
  if(def&&phone){
    localStorage.setItem('customerData', JSON.stringify({
      name:def.name||'', phone:phone, address:def.address,
      lat:def.lat||null, lng:def.lng||null
    }));
  }
}

// BACK buttons
document.getElementById('formBackBtn').onclick = function(){
  if(addresses.length > 0){
    showList();
  } else {
    history.back();
  }
};
document.getElementById('listBackBtn').onclick = function(){
  location.href = backDest;
};

init();
</script>
</body>
</html>
