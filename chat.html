<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แชท</title>
<style>
:root{--p:#0c4aa6;--pd:#083570;--pl:#e8f0fe;--g:#f5f6f8;--t:#0f172a;--s:#64748b;--gn:#16a34a;--gnl:#dcfce7;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:#e8ecf0;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.chat-bar{background:linear-gradient(135deg,var(--p),var(--pd));padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.cb-back{width:36px;height:36px;border:none;background:rgba(255,255,255,.18);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cb-back svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;}
.cb-info{flex:1;min-width:0;}
.cb-title{font-size:15px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cb-sub{font-size:12px;color:rgba(255,255,255,.75);}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 14px 160px;display:flex;flex-direction:column;gap:8px;background:transparent;}
.msg-row{display:flex;flex-direction:column;}
.msg-row.me{align-items:flex-end;}
.msg-row.them{align-items:flex-start;}
.msg-sender{font-size:11px;color:var(--s);margin-bottom:3px;padding:0 4px;}
.bubble{max-width:78%;padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-row.me .bubble{background:var(--p);color:#fff;border-radius:18px 18px 4px 18px;}
.msg-row.them .bubble{background:#fff;color:var(--t);border-radius:18px 18px 18px 4px;box-shadow:0 2px 6px rgba(0,0,0,.1);}
.bubble.admin-bubble{background:#7c3aed;}
.bubble img{max-width:200px;max-height:200px;border-radius:10px;display:block;cursor:pointer;}
.audio-player{display:flex;align-items:center;gap:8px;padding:2px 0;}
.audio-play{width:32px;height:32px;border:none;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.audio-play svg{width:14px;height:14px;fill:#fff;}
.msg-row.them .audio-play{background:var(--p);}
.audio-bar{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;position:relative;cursor:pointer;min-width:80px;}
.msg-row.them .audio-bar{background:#e2e8f0;}
.audio-prog{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .1s;}
.msg-row.them .audio-prog{background:var(--p);}
.audio-dur{font-size:11px;color:rgba(255,255,255,.8);min-width:32px;text-align:right;}
.msg-row.them .audio-dur{color:var(--s);}
.msg-time{font-size:10px;color:var(--s);margin-top:3px;padding:0 4px;}
.msg-row.me{align-items:flex-end;}
.bubble-wrap{display:flex;align-items:flex-end;gap:5px;}
.tick{font-size:12px;font-weight:700;line-height:1;padding-bottom:2px;flex-shrink:0;}
.tick.sent{color:#94a3b8;}
.tick.read{color:#2563eb;}
.date-divider{display:flex;align-items:center;gap:10px;padding:4px 0;}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:#e2e8f0;}
.date-divider span{font-size:11px;color:var(--s);font-weight:600;white-space:nowrap;}
.typing-row{display:flex;align-items:flex-start;gap:6px;padding:0 4px;}
.typing-dots{background:#fff;border-radius:18px;padding:10px 14px;display:flex;gap:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.dot{width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:dotPulse 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,100%{transform:scale(.7);opacity:.5}50%{transform:scale(1);opacity:1}}

/* INPUT AREA */
.input-area{background:#fff;border-top:1px solid #f0f2f5;padding:8px 10px 10px;position:fixed;bottom:0;left:0;right:0;z-index:50;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.input-row{display:flex;align-items:flex-end;gap:6px;}
.input-box{flex:1;min-height:42px;max-height:120px;background:var(--g);border:none;border-radius:22px;padding:11px 14px;font-size:15px;outline:none;resize:none;font-family:inherit;color:var(--t);overflow-y:auto;line-height:1.4;}
.input-box::placeholder{color:#b0b8c1;}
.icon-btn{width:40px;height:40px;border:none;border-radius:50%;background:var(--g);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn svg{width:20px;height:20px;fill:var(--s);}
.icon-btn.send{background:var(--p);}
.icon-btn.send svg{fill:#fff;}
.icon-btn.send:disabled{background:#e2e8f0;}
.icon-btn.recording{background:#ef4444;animation:recPulse .8s infinite;}
@keyframes recPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.extra-btns{display:flex;gap:4px;padding:0 4px 4px;}
.xbtn{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.xbtn:active{background:var(--g);}
.xbtn svg{width:20px;height:20px;fill:var(--s);}
.gif-badge{font-size:11px;font-weight:800;color:var(--s);background:var(--g);border-radius:6px;padding:2px 5px;}
/* RECORD PANEL */
.rec-panel{display:none;position:fixed;left:0;right:0;z-index:48;background:#f1f5f9;border-top:1px solid #e2e8f0;padding:16px 20px 20px;align-items:center;gap:14px;}
.rec-panel.show{display:flex;}
.rec-timer{font-size:22px;font-weight:800;color:var(--r);font-variant-numeric:tabular-nums;min-width:60px;}
.rec-wave{flex:1;height:40px;border-radius:8px;overflow:hidden;}
#waveCanvas{width:100%;height:40px;display:block;}
.rec-stop{width:52px;height:52px;border:none;border-radius:50%;background:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(220,38,38,.3);}
.rec-stop svg{width:20px;height:20px;fill:#fff;}
.rec-cancel{width:40px;height:40px;border:none;border-radius:50%;background:#e2e8f0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.rec-cancel svg{width:16px;height:16px;fill:var(--s);}

/* PREVIEW BAR */
.preview-bar{display:none;align-items:center;justify-content:center;gap:12px;background:#f1f5f9;border-top:1px solid #e2e8f0;padding:12px 16px;position:fixed;left:0;right:0;z-index:49;}
.preview-bar.show{display:flex;}
.preview-img-wrap{position:relative;flex-shrink:0;}
.preview-img-wrap img{width:56px;height:56px;border-radius:10px;object-fit:cover;border:2px solid #bfdbfe;}
.preview-audio-wrap{display:flex;align-items:center;gap:10px;flex:1;background:#fff;border-radius:12px;padding:8px 12px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.preview-play{width:34px;height:34px;border:none;border-radius:50%;background:var(--p);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.preview-play svg{width:14px;height:14px;fill:#fff;}
.preview-audio-bar{flex:1;height:3px;background:#e2e8f0;border-radius:2px;cursor:pointer;}
.preview-audio-prog{height:100%;background:var(--p);border-radius:2px;width:0%;}
.preview-dur{font-size:12px;font-weight:700;color:var(--s);min-width:34px;text-align:right;}
.preview-label{font-size:13px;font-weight:700;color:var(--p);}
.preview-x{width:28px;height:28px;border:none;border-radius:50%;background:#e2e8f0;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto;}
.preview-x svg{width:14px;height:14px;fill:var(--s);}
.preview-send{height:38px;padding:0 18px;border:none;border-radius:20px;background:var(--p);color:#fff;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;}

/* IMAGE VIEWER */
.img-view{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:none;align-items:center;justify-content:center;}
.img-view.show{display:flex;}
.img-view img{max-width:95vw;max-height:90vh;border-radius:12px;}
.img-view-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,.2);border:none;border-radius:50%;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;}

/* EMPTY */
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--s);gap:8px;}
.chat-empty svg{width:48px;height:48px;fill:#cbd5e1;}
.chat-empty p{font-size:14px;font-weight:600;}
.chat-empty span{font-size:13px;}
</style>
</head>
<body>

<div class="chat-bar">
  <button class="cb-back" id="backBtn"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
  <div class="cb-info">
    <div class="cb-title" id="chatTitle">แชท</div>
    <div class="cb-sub" id="chatSub">กำลังโหลด...</div>
  </div>
</div>

<div class="chat-msgs" id="msgs"></div>

<!-- RECORD PANEL -->
<div class="rec-panel" id="recPanel">
  <span class="rec-timer" id="recTimer">0:00</span>
  <div class="rec-wave"><canvas id="waveCanvas"></canvas></div>
  <button class="rec-cancel" onclick="window.cancelRec()"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
  <button class="rec-stop" onclick="window.stopRec()"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button>
</div>

<!-- PREVIEW BAR -->
<div class="preview-bar" id="previewBar">
  <!-- จะ inject content ใน JS -->
</div>

<div class="input-area">
  <div class="extra-btns">
    <button class="xbtn" id="cameraBtn"><svg viewBox="0 0 24 24"><path d="M12 15.2c-1.77 0-3.2-1.43-3.2-3.2S10.23 8.8 12 8.8s3.2 1.43 3.2 3.2-1.43 3.2-3.2 3.2zM20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg></button>
    <button class="xbtn" id="imageBtn"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>
    
    <button class="xbtn" id="micBtn"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6.91 6c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg></button>
  </div>
  <div class="input-row">
    <textarea class="input-box" id="msgInput" placeholder="พิมพ์ข้อความ..." rows="1"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';updSend()"></textarea>
    <button class="icon-btn send" id="sendBtn" onclick="window.sendMsg()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none">
<input type="file" id="imageInput" accept="image/*" style="display:none">

<div class="img-view" id="imgView">
  <button class="img-view-close" onclick="window.document.getElementById('imgView').classList.remove('show')">✕</button>
  <img id="imgViewSrc" src="">
</div>

<script>
['sendMsg','updSend','clearPreview','sendPending','toggleAudio','updProg','resetAudio',
 'viewImg','stopRec','cancelRec','togglePreviewAudio'
].forEach(fn=>{window[fn]=window[fn]||function(){
  const a=arguments;setTimeout(()=>{if(typeof window[fn]==='function')window[fn].apply(null,a);},400);
};});
</script>
<script>
['sendMsg','updSend','clearPreview','sendPending','toggleAudio','updProg','resetAudio',
 'viewImg','stopRec','cancelRec','togglePreviewAudio'
].forEach(fn=>{window[fn]=window[fn]||function(){
  var a=arguments;setTimeout(function(){if(typeof window[fn]==='function')window[fn].apply(null,a);},400);

</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, serverTimestamp, getDoc, setDoc, increment, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({apiKey:"AIzaSyCnBUk0ZKFcwMK0NyYkheux1xPt9bLYhr4",authDomain:"nimit-delivery.firebaseapp.com",projectId:"nimit-delivery",storageBucket:"nimit-delivery.firebasestorage.app",messagingSenderId:"233476256130",appId:"1:233476256130:web:62ba8f64ad0bf2f92c9f9b"});
const db = getFirestore(app);
const storage = getStorage(app);

// URL params
const params = new URLSearchParams(location.search);
const orderId = params.get('orderId') || '';
const role = params.get('role') || 'customer'; // customer | rider | admin
const myName = role==='admin'?'แอดมิน':role==='rider'?'ไรเดอร์':'ลูกค้า';
const roleLabel = {'customer':'ลูกค้า','rider':'ไรเดอร์','admin':'แอดมิน'};
const backUrl = role==='admin'?'javascript:history.back()':role==='rider'?'rider.html':'track.html';

// Init
document.getElementById('backBtn').onclick=()=>history.back();
document.getElementById('chatTitle').textContent='แชท #'+orderId;
document.getElementById('chatSub').textContent=roleLabel[role]||role;

// Track read times of other parties
let otherReadAt = {}; // { rider: Date, customer: Date, admin: Date }

onSnapshot(doc(db,'chats',orderId), snap=>{
  if(!snap.exists()) return;
  const d = snap.data();
  ['customer','rider','admin'].forEach(r=>{
    if(r !== role && d[r+'ReadAt']){
      otherReadAt[r] = d[r+'ReadAt'].toDate();
    }
  });
  // re-render tick status (จะ re-render ผ่าน message listener เอง)
});

// Load order info
async function loadOrderInfo(){
  try{
    const snap = await getDoc(doc(db,'orders',orderId));
    if(snap.exists()){
      const o = snap.data();
      document.getElementById('chatTitle').textContent='แชท '+o.orderId;
      document.getElementById('chatSub').textContent=(o.shopName||'')+' · '+(o.customer?.name||o.customer?.phone||'');
    }
  }catch(e){}
}
loadOrderInfo();

// Mark as read
async function markRead(){
  try{
    const metaRef=doc(db,'chats',orderId);
    const upd={};
    upd['unread_'+role]=0;
    upd[role+'ReadAt']=serverTimestamp();
    await setDoc(metaRef,upd,{merge:true});
  }catch(e){}
}
markRead();

// Listen messages
let lastDate = '';
const msgsEl = document.getElementById('msgs');

onSnapshot(
  query(collection(db,'chats',orderId,'messages'), orderBy('timestamp','asc'), limit(200)),
  snap => {
    msgsEl.innerHTML = '';
    lastDate = '';
    if(snap.empty){
      msgsEl.innerHTML = '<div class="chat-empty"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg><p>ยังไม่มีข้อความ</p><span>เริ่มการสนทนา</span></div>';
      return;
    }
    snap.forEach(d=>{
      const msg = {id:d.id,...d.data()};
      const ts = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
      const dateStr = ts.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
      if(dateStr !== lastDate){
        lastDate = dateStr;
        const div = document.createElement('div');
        div.className = 'date-divider';
        div.innerHTML = `<span>${dateStr}</span>`;
        msgsEl.appendChild(div);
      }
      const isMe = msg.sender === role;
      const row = document.createElement('div');
      row.className = 'msg-row '+(isMe?'me':'them');
      const timeStr = ts.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
      let content = '';
      if(msg.type==='image'){
        content = `<div class="bubble ${msg.sender==='admin'&&!isMe?'admin-bubble':''}"><img src="${msg.content}" onclick="window.viewImg('${msg.content}')" loading="lazy"></div>`;
      } else if(msg.type==='audio'){
        const aid = 'aud_'+msg.id;
        content = `<div class="bubble ${msg.sender==='admin'&&!isMe?'admin-bubble':''}"><div class="audio-player"><button class="audio-play" onclick="window.toggleAudio('${aid}','${msg.content}')"><svg viewBox="0 0 24 24" id="ic_${aid}"><path d="M8 5v14l11-7z"/></svg></button><div class="audio-bar" id="bar_${aid}"><div class="audio-prog" id="prog_${aid}"></div></div><span class="audio-dur" id="dur_${aid}">0:00</span></div><audio id="${aid}" src="${msg.content}" preload="none" ontimeupdate="updProg('${aid}')" onended="resetAudio('${aid}')"></audio></div>`;
      } else {
        content = `<div class="bubble ${msg.sender==='admin'&&!isMe?'admin-bubble':''}">${escHtml(msg.content||'')}</div>`;
      }
      if(!isMe) row.innerHTML += `<div class="msg-sender">${msg.senderName||roleLabel[msg.sender]||''}</div>`;
      if(isMe){
        const otherRoles=['customer','rider','admin'].filter(x=>x!==role);
        const anyRead=otherRoles.some(x=>otherReadAt[x]&&otherReadAt[x]>=ts);
        const tick=`<span class="tick ${anyRead?'read':'sent'}">${anyRead?'อ่านแล้ว':'ส่งแล้ว'}</span>`;
        row.innerHTML += `<div class="bubble-wrap">${tick}${content}</div>`;
      } else {
        row.innerHTML += content;
      }
      row.innerHTML += `<div class="msg-time">${timeStr}</div>`;
      msgsEl.appendChild(row);
    });
    scrollBottom();
    markRead();
  }
);

function scrollBottom(){ msgsEl.scrollTop = msgsEl.scrollHeight; }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// Send text
window.updSend=function(){};  // ไม่ต้องทำอะไร ปุ่มใช้ได้เสมอ

window.sendMsg=async function(){
  // ถ้ามี pending media → ส่งก่อน
  if(pendingFile){ const f=pendingFile; clearPreview(); await uploadImageFile(f); }
  else if(pendingAudioBlob){ const b=pendingAudioBlob; clearPreview(); await uploadAudioBlob(b); }
  // ส่งข้อความถ้ามี
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(text){ input.value=''; input.style.height='auto'; await sendMessage('text',text); }
};

async function sendMessage(type, content){
  if(!orderId||orderId==='undefined'||orderId==='unknown'){
    alert('ไม่พบรหัสออเดอร์ กรุณาเข้าจากหน้าออเดอร์');return;
  }
  try{
    await addDoc(collection(db,'chats',orderId,'messages'),{
      sender:role, senderName:myName, type, content,
      timestamp:serverTimestamp(), readBy:[role]
    });
    const metaRef=doc(db,'chats',orderId);
    const upd={lastMessage:type==='text'?content:'['+type+']',lastTime:serverTimestamp()};
    ['customer','rider','admin'].forEach(r=>{ if(r!==role) upd['unread_'+r]=increment(1); });
    await setDoc(metaRef,upd,{merge:true});
    scrollBottom();
  }catch(e){
    console.error('sendMessage error:',e);
    alert('ส่งไม่สำเร็จ: '+e.message);
  }
}

// Image upload
let pendingFile=null, pendingAudioBlob=null, pendingAudioUrl=null, previewAudio=null;

function showImgPreview(file){
  pendingFile=file;
  const url=URL.createObjectURL(file);
  const bar=document.getElementById('previewBar');
  bar.innerHTML=`
    <img src="${url}" style="width:56px;height:56px;border-radius:10px;object-fit:cover;border:2px solid #bfdbfe;flex-shrink:0">
    <span class="preview-label">พร้อมส่งรูปภาพ</span>
    <button class="preview-x" onclick="window.clearPreview()"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    <button class="preview-send" onclick="window.sendPending()">ส่ง</button>`;
  bar.classList.add('show');
  posPreviewBar();
}

function showAudioPreview(blob, durationSec){
  pendingAudioBlob=blob;
  pendingAudioUrl=URL.createObjectURL(blob);
  if(previewAudio){previewAudio.pause();previewAudio=null;}
  previewAudio=new Audio(pendingAudioUrl);
  const dur=durationSec||0;
  const fmt=s=>Math.floor(s/60)+':'+(Math.floor(s)%60<10?'0':'')+Math.floor(s)%60;
  const bar=document.getElementById('previewBar');
  bar.innerHTML=`
    <div class="preview-audio-wrap">
      <button class="preview-play" id="prevPlayBtn" onclick="window.togglePreviewAudio()"><svg viewBox="0 0 24 24" id="prevPlayIc"><path d="M8 5v14l11-7z"/></svg></button>
      <div class="preview-audio-bar"><div class="preview-audio-prog" id="prevProg"></div></div>
      <span class="preview-dur" id="prevDur">${fmt(dur)}</span>
    </div>
    <button class="preview-x" onclick="window.clearPreview()"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    <button class="preview-send" onclick="window.sendPending()">ส่ง</button>`;
  bar.classList.add('show');
  previewAudio.ontimeupdate=()=>{
    const p=document.getElementById('prevProg');
    const d2=document.getElementById('prevDur');
    if(p&&previewAudio.duration)p.style.width=(previewAudio.currentTime/previewAudio.duration*100)+'%';
    if(d2)d2.textContent=fmt(previewAudio.currentTime);
  };
  previewAudio.onended=()=>{
    document.getElementById('prevPlayIc').innerHTML='<path d="M8 5v14l11-7z"/>';
    const p=document.getElementById('prevProg');if(p)p.style.width='0%';
  };
  posPreviewBar();
}

window.togglePreviewAudio=function(){
  if(!previewAudio)return;
  const ic=document.getElementById('prevPlayIc');
  if(previewAudio.paused){
    previewAudio.play();
    ic.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  }else{
    previewAudio.pause();
    ic.innerHTML='<path d="M8 5v14l11-7z"/>';
  }
};

function posPreviewBar(){
  const inputArea=document.querySelector('.input-area');
  if(!inputArea)return;
  const h=inputArea.getBoundingClientRect().height;
  const bar=document.getElementById('previewBar');
  const rec=document.getElementById('recPanel');
  if(bar)bar.style.bottom=h+'px';
  if(rec)rec.style.bottom=h+'px';
}
window.addEventListener('resize',posPreviewBar);
setTimeout(posPreviewBar,300);

window.clearPreview=function(){
  if(previewAudio){previewAudio.pause();previewAudio=null;}
  if(pendingAudioUrl)URL.revokeObjectURL(pendingAudioUrl);
  pendingFile=null;pendingAudioBlob=null;pendingAudioUrl=null;
  const bar=document.getElementById('previewBar');
  bar.classList.remove('show');bar.innerHTML='';
  // reset file inputs
  document.getElementById('cameraInput').value='';
  document.getElementById('imageInput').value='';
};

window.sendPending=async function(){
  if(pendingFile){
    const file=pendingFile;clearPreview();
    await uploadImageFile(file);
  } else if(pendingAudioBlob){
    const blob=pendingAudioBlob;clearPreview();
    await uploadAudioBlob(blob);
  }
};

async function uploadImageFile(file){
  // resize → base64 → store in Firestore (ไม่ต้องพึ่ง Storage rules)
  try{
    const canvas=document.createElement('canvas'),img=new Image();
    const url=URL.createObjectURL(file);
    await new Promise((res,rej)=>{
      img.onload=res;img.onerror=rej;img.src=url;
    });
    let w=img.width,h=img.height;
    const max=600;
    if(w>max){h=Math.round(h*max/w);w=max;}
    if(h>max){w=Math.round(w*max/h);h=max;}
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    const b64=canvas.toDataURL('image/jpeg',0.7);
    URL.revokeObjectURL(url);
    if(b64.length>900000){alert('รูปใหญ่เกินไป กรุณาเลือกรูปขนาดเล็กกว่านี้');return;}
    await sendMessage('image',b64);
  }catch(e){console.error(e);alert('ส่งรูปไม่สำเร็จ: '+e.message);}
}

async function uploadAudioBlob(blob){
  try{
    const reader=new FileReader();
    const b64=await new Promise((res,rej)=>{
      reader.onload=()=>res(reader.result);
      reader.onerror=rej;
      reader.readAsDataURL(blob);
    });
    if(b64.length>900000){alert('ไฟล์เสียงใหญ่เกินไป');return;}
    await sendMessage('audio',b64);
  }catch(e){console.error(e);alert('ส่งเสียงไม่สำเร็จ: '+e.message);}
}

async function uploadAndSend(file){ showImgPreview(file); }

document.getElementById('cameraBtn').onclick=()=>document.getElementById('cameraInput').click();
document.getElementById('imageBtn').onclick=()=>document.getElementById('imageInput').click();
document.getElementById('cameraInput').onchange=e=>{ if(e.target.files[0]) uploadAndSend(e.target.files[0]); };
document.getElementById('imageInput').onchange=e=>{ if(e.target.files[0]) uploadAndSend(e.target.files[0]); };



// Voice recording
let mediaRec=null, audioChunks=[], isRec=false, recInterval=null, recSecs=0;

document.getElementById('micBtn').addEventListener('click', startRec);

let waveAnimId=null,audioCtx=null,analyser=null;

async function startRec(){
  if(isRec)return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec=new MediaRecorder(stream);
    audioChunks=[];isRec=true;recSecs=0;
    mediaRec.ondataavailable=e=>audioChunks.push(e.data);
    mediaRec.start(100);
    document.getElementById('recPanel').classList.add('show');
    posPreviewBar();
    recInterval=setInterval(()=>{
      recSecs++;
      const m=Math.floor(recSecs/60),s=recSecs%60;
      document.getElementById('recTimer').textContent=m+':'+(s<10?'0':'')+s;
    },1000);
    // Web Audio waveform
    try{
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      analyser=audioCtx.createAnalyser();
      analyser.fftSize=128;
      const src=audioCtx.createMediaStreamSource(stream);
      src.connect(analyser);
      drawWave();
    }catch(e){}
  }catch(e){ alert('ไม่สามารถเข้าถึงไมค์ได้'); }
}

function drawWave(){
  const canvas=document.getElementById('waveCanvas');
  if(!canvas||!analyser)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||200,H=40;
  canvas.width=W;canvas.height=H;
  const data=new Uint8Array(analyser.frequencyBinCount);
  function draw(){
    if(!isRec){ctx.clearRect(0,0,W,H);return;}
    waveAnimId=requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    ctx.fillStyle='#fee2e2';ctx.fillRect(0,0,W,H);
    const bars=24,bw=Math.floor(W/bars)-2,gap=2;
    for(let i=0;i<bars;i++){
      const val=data[Math.floor(i*data.length/bars)]/255;
      const bh=Math.max(4,val*H*0.9);
      const x=i*(bw+gap)+(W-(bars*(bw+gap)))/2;
      const y=(H-bh)/2;
      ctx.fillStyle=`rgba(239,68,68,${0.4+val*0.6})`;
      ctx.beginPath();ctx.roundRect(x,y,bw,bh,2);ctx.fill();
    }
  }
  draw();
}

window.stopRec=async function(){
  if(!isRec||!mediaRec)return;
  isRec=false;clearInterval(recInterval);
  document.getElementById('recPanel').classList.remove('show');
  mediaRec.onstop=()=>{
    if(recSecs<1){audioChunks=[];return;}
    const blob=new Blob(audioChunks,{type:'audio/webm'});
    showAudioPreview(blob,recSecs);
    audioChunks=[];
  };
  mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());
  mediaRec=null;
  if(waveAnimId)cancelAnimationFrame(waveAnimId);
  if(audioCtx)audioCtx.close();
};

window.cancelRec=function(){
  if(!isRec||!mediaRec)return;
  isRec=false;clearInterval(recInterval);
  document.getElementById('recPanel').classList.remove('show');
  document.getElementById('recTimer').textContent='0:00';
  mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());
  mediaRec=null;audioChunks=[];
};

// Audio player
const audios = {};
window.toggleAudio=function(id, src){
  let a = document.getElementById(id);
  if(!a){ a = new Audio(src); document.body.appendChild(a); }
  const ic = document.getElementById('ic_'+id);
  if(a.paused){
    Object.values(audios).forEach(x=>{ if(!x.paused){x.pause();} });
    a.play();
    ic.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    audios[id]=a;
  } else {
    a.pause();
    ic.innerHTML='<path d="M8 5v14l11-7z"/>';
  }
};
window.updProg=function(id){
  const a=document.getElementById(id);if(!a)return;
  const p=document.getElementById('prog_'+id);
  const d=document.getElementById('dur_'+id);
  if(p&&a.duration) p.style.width=(a.currentTime/a.duration*100)+'%';
  if(d){const s=Math.floor(a.currentTime);d.textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);}
};
window.resetAudio=function(id){
  const p=document.getElementById('prog_'+id);
  const d=document.getElementById('dur_'+id);
  const ic=document.getElementById('ic_'+id);
  if(p)p.style.width='0%';if(d)d.textContent='0:00';
  if(ic)ic.innerHTML='<path d="M8 5v14l11-7z"/>';
};

document.getElementById('msgInput').addEventListener('keydown',e=>{

});

// Paste — รองรับ GIF/รูปจากแป้นพิมพ์มือถือ
document.getElementById('msgInput').addEventListener('paste', async e=>{
  const items = e.clipboardData?.items;
  if(!items) return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const file = item.getAsFile();
      if(file) await uploadImageFile(file);
      return;
    }
  }
});
