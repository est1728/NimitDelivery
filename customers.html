<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ลูกค้า</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{--p:#0c4aa6;--pd:#083570;--pl:#e8f0fe;--g:#f5f6f8;--t:#0f172a;--s:#64748b;--gn:#16a34a;--gnl:#dcfce7;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--g);min-height:100vh;}
.hd{background:linear-gradient(135deg,var(--p),var(--pd));padding:14px 16px;}
.hd-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.back{width:38px;height:38px;border:none;background:rgba(255,255,255,.18);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;}
.hd-t{font-size:17px;font-weight:800;color:#fff;flex:1;}
.add-btn{height:34px;padding:0 14px;border:none;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:800;cursor:pointer;}
.cnt{font-size:12px;color:rgba(255,255,255,.75);}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-right:4px;animation:livePing .9s infinite;}
@keyframes livePing{0%,100%{opacity:1}50%{opacity:.3}}
.srch-wrap{position:relative;}
.srch-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;fill:none;stroke:#94a3b8;stroke-width:2;}
.srch-box{width:100%;height:44px;border:none;border-radius:22px;background:#fff;padding:0 16px 0 40px;font-size:15px;outline:none;}
.stats{display:flex;gap:10px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;}
.stats::-webkit-scrollbar{display:none;}
.stat{background:#fff;border-radius:14px;padding:12px 16px;flex-shrink:0;min-width:90px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.stat-n{font-size:22px;font-weight:900;color:var(--p);}
.stat-l{font-size:11px;color:var(--s);margin-top:2px;}
.list{padding:0 16px 80px;}
.cus-card{background:#fff;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;}
.cus-card:active{opacity:.9;}
.cus-top{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;font-weight:800;color:#fff;}
.ci{flex:1;min-width:0;}
.cn{font-size:15px;font-weight:800;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cp{font-size:12px;color:var(--s);margin-top:2px;}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0;}
.badge-new{background:#fef3c7;color:#d97706;}
.badge-reg{background:var(--gnl);color:var(--gn);}
.cus-addr{padding:0 16px 12px;font-size:12px;color:var(--s);display:flex;align-items:flex-start;gap:6px;}
.cus-addr svg{width:12px;height:12px;fill:var(--s);flex-shrink:0;margin-top:1px;}
.lt{text-align:center;padding:40px;color:var(--s);}
/* MODAL */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;}
.mask.show{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:85vh;overflow-y:auto;}
.modal-hd{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-t{font-size:16px;font-weight:800;color:var(--t);}
.modal-x{width:32px;height:32px;border:none;background:var(--g);border-radius:50%;cursor:pointer;font-size:18px;color:var(--s);}
/* Detail */
.d-av{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;margin:16px auto 12px;font-size:28px;font-weight:900;color:#fff;}
.d-name{text-align:center;font-size:20px;font-weight:800;color:var(--t);}
.d-phone{text-align:center;font-size:14px;color:var(--s);margin-top:4px;}
.d-rows{padding:14px 16px;}
.d-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #f5f6f8;}
.d-row:last-child{border:none;}
.d-ico{width:36px;height:36px;border-radius:10px;background:var(--pl);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.d-ico svg{width:16px;height:16px;fill:var(--p);}
.d-lbl{font-size:12px;color:var(--s);}
.d-val{font-size:14px;font-weight:700;color:var(--t);margin-top:2px;}
.modal-btns{padding:12px 16px 28px;display:flex;gap:10px;}
.btn-p{flex:1;height:48px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:14px;font-weight:800;cursor:pointer;}
.btn-s{flex:1;height:48px;border:none;border-radius:14px;background:var(--pl);color:var(--p);font-size:14px;font-weight:800;cursor:pointer;}
/* Add form */
.f-sec{padding:16px;}
.f-lbl{font-size:12px;font-weight:700;color:var(--s);margin-bottom:6px;}
.f-in{width:100%;height:46px;border:2px solid #e8eef5;border-radius:12px;padding:0 14px;font-size:15px;outline:none;margin-bottom:12px;}
.f-in:focus{border-color:var(--p);}
.map-box{height:180px;border-radius:12px;overflow:hidden;border:2px solid #e8eef5;margin-bottom:8px;}
.loc-btn{width:100%;height:38px;border:2px solid var(--p);border-radius:10px;background:#fff;color:var(--p);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:14px;}
.save-btn{width:100%;height:50px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:16px;font-weight:800;cursor:pointer;}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-row">
    <button class="back" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
    <div class="hd-t">ลูกค้า</div>
    <span class="cnt"><span class="live-dot"></span><span id="cusCount">0</span> คน</span>
    <button class="add-btn" onclick="openAdd()">+ เพิ่ม</button>
  </div>
  <div class="srch-wrap">
    <svg class="srch-ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    <input class="srch-box" placeholder="ค้นหาชื่อหรือเบอร์..." oninput="filterCus(this.value)">
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n" id="stTotal">0</div><div class="stat-l">ทั้งหมด</div></div>
  <div class="stat"><div class="stat-n" id="stNew">0</div><div class="stat-l">ใหม่วันนี้</div></div>
  <div class="stat"><div class="stat-n" id="stAddr">0</div><div class="stat-l">มีที่อยู่</div></div>
</div>

<div class="list" id="cusList"><div class="lt">กำลังโหลด...</div></div>

<!-- DETAIL MODAL -->
<div class="mask" id="detMask">
  <div class="modal">
    <div class="modal-hd"><div class="modal-t">ข้อมูลลูกค้า</div><button class="modal-x" onclick="closeDet()">✕</button></div>
    <div class="d-av" id="dAv">?</div>
    <div class="d-name" id="dName">-</div>
    <div class="d-phone" id="dPhone">-</div>
    <div class="d-rows">
      <div class="d-row"><div class="d-ico"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div><div><div class="d-lbl">ที่อยู่</div><div class="d-val" id="dAddr">-</div></div></div>
      <div class="d-row"><div class="d-ico"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></div><div><div class="d-lbl">สมัครเมื่อ</div><div class="d-val" id="dDate">-</div></div></div>
    </div>
    <div class="modal-btns">
      <button class="btn-s" onclick="closeDet()">ปิด</button>
      <button class="btn-p" onclick="orderForCus()">+ สร้างออเดอร์</button>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="mask" id="addMask">
  <div class="modal">
    <div class="modal-hd"><div class="modal-t">เพิ่มลูกค้าใหม่</div><button class="modal-x" onclick="closeAdd()">✕</button></div>
    <div class="f-sec">
      <div class="f-lbl">ชื่อ-นามสกุล</div>
      <input class="f-in" id="fName" placeholder="ชื่อ-นามสกุล">
      <div class="f-lbl">เบอร์โทร <span style="color:#dc2626">*</span></div>
      <input class="f-in" id="fPhone" type="tel" placeholder="08X-XXX-XXXX">
      <div class="f-lbl">ที่อยู่จัดส่ง</div>
      <input class="f-in" id="fAddr" placeholder="บ้านเลขที่ ซอย ถนน">
      <div class="f-lbl">ปักหมุดตำแหน่ง</div>
      <div class="map-box" id="fMap"></div>
      <button class="loc-btn" onclick="useMyLoc()">📍 ใช้ตำแหน่งปัจจุบัน</button>
      <button class="save-btn" onclick="saveCus()">บันทึกลูกค้า</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,doc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCnBUk0ZKFcwMK0NyYkheux1xPt9bLYhr4",authDomain:"nimit-delivery.firebaseapp.com",projectId:"nimit-delivery",storageBucket:"nimit-delivery.firebasestorage.app",messagingSenderId:"233476256130",appId:"1:233476256130:web:62ba8f64ad0bf2f92c9f9b"});
const db=getFirestore(app);
// expose ให้ regular script ใช้
window._db=db;window._col=collection;window._doc=doc;window._setDoc=setDoc;
window._onSnapshot=onSnapshot;
// เริ่ม listener
window._startCus();
</script>
<script>
function _db_ready(fn){if(window._db)fn();else setTimeout(()=>_db_ready(fn),100);}
window._startCus=function(){
var allCus=[], curQ='', selCus=null;
var fMap=null, fMarker=null, fLat=13.7563, fLng=100.5018;
var today = new Date().toDateString();

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// REAL-TIME
window._onSnapshot(window._col(window._db,'customers'),function(snap){
  allCus=[];
  snap.forEach(function(d){allCus.push(Object.assign({phone:d.id},d.data()));});
  allCus.sort(function(a,b){return (b.updatedAt||b.createdAt||'').localeCompare(a.updatedAt||a.createdAt||'');});
  updateStats();
  renderList(curQ?allCus.filter(function(c){return (c.name||'').toLowerCase().includes(curQ)||(c.phone||'').includes(curQ);}):allCus);
},function(e){document.getElementById('cusList').innerHTML='<div class="lt">โหลดไม่ได้: '+e.message+'</div>';});

function updateStats(){
  document.getElementById('cusCount').textContent=allCus.length;
  document.getElementById('stTotal').textContent=allCus.length;
  var newT=allCus.filter(function(c){var d=c.createdAt;return d&&new Date(typeof d==='string'?d:d.seconds*1000).toDateString()===today;}).length;
  document.getElementById('stNew').textContent=newT;
  document.getElementById('stAddr').textContent=allCus.filter(function(c){return c.address;}).length;
}

function renderList(list){
  var el=document.getElementById('cusList');
  if(!list.length){el.innerHTML='<div class="lt">ไม่พบลูกค้า</div>';return;}
  el.innerHTML=list.map(function(c){
    var init=(c.name||c.phone||'?').slice(0,1).toUpperCase();
    var isNew=c.createdAt&&new Date(typeof c.createdAt==='string'?c.createdAt:c.createdAt.seconds*1000).toDateString()===today;
    return '<div class="cus-card" onclick="openDet(\''+c.phone+'\')">'+
      '<div class="cus-top"><div class="av">'+init+'</div>'+
      '<div class="ci"><div class="cn">'+esc(c.name||'-')+'</div><div class="cp">'+c.phone+'</div></div>'+
      '<div class="badge '+(isNew?'badge-new':'badge-reg')+'">'+(isNew?'ใหม่':'ลงทะเบียน')+'</div></div>'+
      (c.address?'<div class="cus-addr"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg><span>'+esc(c.address)+'</span></div>':'')+
      '</div>';
  }).join('');
}

function filterCus(q){curQ=q.toLowerCase();renderList(curQ?allCus.filter(function(c){return(c.name||'').toLowerCase().includes(curQ)||(c.phone||'').includes(curQ);}):allCus);}

// DETAIL
function openDet(phone){
  selCus=allCus.find(function(c){return c.phone===phone;});
  if(!selCus)return;
  document.getElementById('dAv').textContent=(selCus.name||selCus.phone||'?').slice(0,1).toUpperCase();
  document.getElementById('dName').textContent=selCus.name||'-';
  document.getElementById('dPhone').textContent=selCus.phone;
  document.getElementById('dAddr').textContent=selCus.address||'ยังไม่มีที่อยู่';
  var ts=selCus.updatedAt||selCus.createdAt;
  document.getElementById('dDate').textContent=ts?new Date(typeof ts==='string'?ts:ts.seconds*1000).toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'}):'-';
  document.getElementById('detMask').classList.add('show');
}
function closeDet(){document.getElementById('detMask').classList.remove('show');}
function orderForCus(){if(selCus){sessionStorage.setItem('preselCus',JSON.stringify(selCus));location.href='order-create.html';}}

// ADD
function openAdd(){
  document.getElementById('fName').value='';
  document.getElementById('fPhone').value='';
  document.getElementById('fAddr').value='';
  document.getElementById('addMask').classList.add('show');
  setTimeout(function(){
    document.getElementById('fPhone').focus();
    if(fMap){fMap.remove();fMap=null;}
    fMap=L.map('fMap').setView([fLat,fLng],15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(fMap);
    fMarker=L.marker([fLat,fLng],{draggable:true}).addTo(fMap);
    fMarker.on('dragend',function(e){fLat=e.target.getLatLng().lat;fLng=e.target.getLatLng().lng;});
    fMap.on('contextmenu',function(e){fLat=e.latlng.lat;fLng=e.latlng.lng;fMarker.setLatLng(e.latlng);});
  },300);
}
function closeAdd(){document.getElementById('addMask').classList.remove('show');}
function useMyLoc(){
  navigator.geolocation.getCurrentPosition(function(p){
    fLat=p.coords.latitude;fLng=p.coords.longitude;
    if(fMap)fMap.setView([fLat,fLng],16);
    if(fMarker)fMarker.setLatLng([fLat,fLng]);
  },function(){alert('ไม่สามารถเข้าถึง GPS');});
}
function saveCus(){
  var phone=document.getElementById('fPhone').value.trim().replace(/[^0-9]/g,'');
  var name=document.getElementById('fName').value.trim();
  var addr=document.getElementById('fAddr').value.trim();
  if(!phone||phone.length<8){alert('กรุณากรอกเบอร์โทรให้ถูกต้อง');return;}
  window._setDoc(window._doc(window._db,'customers',phone),{
    name:name||'',address:addr||'',
    lat:fLat||null,lng:fLng||null,
    createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString(),
    createdBy:'admin'
  },{merge:true}).then(function(){
    closeAdd();
    alert('เพิ่มลูกค้า '+(name||phone)+' แล้ว');
  }).catch(function(e){alert('เกิดข้อผิดพลาด: '+e.message);});
}
}; // end _startCus
</script>
</body>
</html>
