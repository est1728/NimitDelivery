<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ลูกค้า</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{--p:#0c4aa6;--pd:#083570;--pl:#e8f0fe;--g:#f5f6f8;--t:#0f172a;--s:#64748b;--gn:#16a34a;--gnl:#dcfce7;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--g);min-height:100vh;}
.hd{background:linear-gradient(135deg,var(--p),var(--pd));padding:14px 16px;}
.hd-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.back{width:38px;height:38px;border:none;background:rgba(255,255,255,.18);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;}
.hd-t{font-size:17px;font-weight:800;color:#fff;flex:1;}
.add-btn{height:34px;padding:0 14px;border:none;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:800;cursor:pointer;}
.cnt{font-size:12px;color:rgba(255,255,255,.75);}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-right:4px;animation:p .9s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.srch-wrap{position:relative;}
.srch-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;fill:none;stroke:#94a3b8;stroke-width:2;pointer-events:none;}
.srch-box{width:100%;height:44px;border:none;border-radius:22px;background:#fff;padding:0 16px 0 40px;font-size:15px;outline:none;}
.stats{display:flex;gap:10px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;}
.stat{background:#fff;border-radius:14px;padding:12px 16px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.stat-n{font-size:22px;font-weight:900;color:var(--p);}
.stat-l{font-size:11px;color:var(--s);}
.list{padding:0 16px 80px;}
.card{background:#fff;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;}
.card:active{opacity:.9;}
.ct{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;font-weight:800;color:#fff;}
.ci{flex:1;min-width:0;}
.cn{font-size:15px;font-weight:800;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cp{font-size:12px;color:var(--s);margin-top:2px;}
.bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.new{background:#fef3c7;color:#d97706;}
.reg{background:var(--gnl);color:var(--gn);}
.ca{padding:0 16px 12px;font-size:12px;color:var(--s);display:flex;gap:6px;}
.ca svg{width:12px;height:12px;fill:var(--s);flex-shrink:0;margin-top:1px;}
.lt{text-align:center;padding:40px;color:var(--s);}
.mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;}
.mask.show{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:85vh;overflow-y:auto;}
.mhd{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.mt{font-size:16px;font-weight:800;color:var(--t);}
.mx{width:32px;height:32px;border:none;background:var(--g);border-radius:50%;cursor:pointer;font-size:18px;color:var(--s);}
.dav{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;margin:16px auto 12px;font-size:28px;font-weight:900;color:#fff;}
.dnm{text-align:center;font-size:20px;font-weight:800;color:var(--t);}
.dph{text-align:center;font-size:14px;color:var(--s);margin-top:4px;}
.drows{padding:14px 16px;}
.drow{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f5f6f8;}
.drow:last-child{border:none;}
.dico{width:36px;height:36px;border-radius:10px;background:var(--pl);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dico svg{width:16px;height:16px;fill:var(--p);}
.dl{font-size:12px;color:var(--s);}
.dv{font-size:14px;font-weight:700;color:var(--t);margin-top:2px;}
.mbtns{padding:12px 16px 28px;display:flex;gap:10px;}
.btn-p{flex:1;height:48px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:14px;font-weight:800;cursor:pointer;}
.btn-s{flex:1;height:48px;border:none;border-radius:14px;background:var(--pl);color:var(--p);font-size:14px;font-weight:800;cursor:pointer;}
.fs{padding:16px;}
.fl{font-size:12px;font-weight:700;color:var(--s);margin-bottom:6px;}
.fi{width:100%;height:46px;border:2px solid #e8eef5;border-radius:12px;padding:0 14px;font-size:15px;outline:none;margin-bottom:12px;}
.fi:focus{border-color:var(--p);}
.mapb{height:180px;border-radius:12px;overflow:hidden;border:2px solid #e8eef5;margin-bottom:8px;}
.locbtn{width:100%;height:38px;border:2px solid var(--p);border-radius:10px;background:#fff;color:var(--p);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:14px;}
.savebtn{width:100%;height:50px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:16px;font-weight:800;cursor:pointer;}
</style>
</head>
<body>
<div class="hd">
  <div class="hd-row">
    <button class="back" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
    <div class="hd-t">ลูกค้า</div>
    <span class="cnt"><span class="live-dot"></span><span id="cusCount">0</span> คน</span>
    <button class="add-btn" id="addBtn">+ เพิ่ม</button>
  </div>
  <div class="srch-wrap">
    <svg class="srch-ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    <input class="srch-box" id="srchBox" placeholder="ค้นหาชื่อหรือเบอร์...">
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-n" id="stTotal">0</div><div class="stat-l">ทั้งหมด</div></div>
  <div class="stat"><div class="stat-n" id="stNew">0</div><div class="stat-l">ใหม่วันนี้</div></div>
  <div class="stat"><div class="stat-n" id="stAddr">0</div><div class="stat-l">มีที่อยู่</div></div>
</div>
<div class="list" id="cusList"><div class="lt">กำลังโหลด...</div></div>

<!-- DETAIL -->
<div class="mask" id="detMask">
  <div class="modal">
    <div class="mhd"><div class="mt">ข้อมูลลูกค้า</div><button class="mx" id="detClose">✕</button></div>
    <div class="dav" id="dAv">?</div>
    <div class="dnm" id="dNm">-</div>
    <div class="dph" id="dPh">-</div>
    <div class="drows">
      <div class="drow"><div class="dico"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div><div><div class="dl">ที่อยู่</div><div class="dv" id="dAddr">-</div></div></div>
      <div class="drow"><div class="dico"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></div><div><div class="dl">สมัครเมื่อ</div><div class="dv" id="dDate">-</div></div></div>
    </div>
    <div class="mbtns">
      <button class="btn-s" id="detCloseBtn">ปิด</button>
      <button class="btn-p" id="editCusBtn">แก้ไขข้อมูล</button>
    </div>
    <button class="btn-p" id="orderBtn" style="width:100%;margin-top:10px">+ สร้างออเดอร์</button>
    <button id="delCusBtn" style="width:100%;height:44px;margin-top:10px;border:none;border-radius:12px;background:#fee2e2;color:#dc2626;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#dc2626"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      ลบข้อมูลลูกค้า
    </button>
  </div>
</div>

<!-- ADD -->
<div class="mask" id="addMask">
  <div class="modal">
    <div class="mhd"><div class="mt" id="addMaskTitle">เพิ่มลูกค้าใหม่</div><button class="mx" id="addClose">✕</button></div>
    <div class="fs">
      <div class="fl">ชื่อ-นามสกุล</div><input class="fi" id="fName" placeholder="ชื่อ-นามสกุล">
      <div class="fl">เบอร์โทร <span style="color:#dc2626">*</span></div><input class="fi" id="fPhone" type="tel" placeholder="08X-XXX-XXXX">
      <div class="fl">ที่อยู่จัดส่ง</div><input class="fi" id="fAddr" placeholder="บ้านเลขที่ ซอย ถนน">
      <div class="fl">ปักหมุดตำแหน่ง</div>
      <div class="mapb" id="fMap"></div>
      <button class="locbtn" id="locBtn">📍 ใช้ตำแหน่งปัจจุบัน</button>
      <button class="savebtn" id="saveBtn">บันทึกลูกค้า</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const db=getFirestore(initializeApp({apiKey:"AIzaSyCnBUk0ZKFcwMK0NyYkheux1xPt9bLYhr4",authDomain:"nimit-delivery.firebaseapp.com",projectId:"nimit-delivery",storageBucket:"nimit-delivery.firebasestorage.app",messagingSenderId:"233476256130",appId:"1:233476256130:web:62ba8f64ad0bf2f92c9f9b"}));

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let allCus=[],curQ='',selCus=null,fMap=null,fMarker=null,fLat=13.7563,fLng=100.5018,editMode=false;
const today=new Date().toDateString();

// รองรับ timestamp ได้หลายแบบ: ISO string, Firestore Timestamp object ({seconds,...} หรือมี .toDate()), หรือไม่มีค่า
function toMillis(v){
  if(!v) return 0;
  if(typeof v === 'string'){ const t=new Date(v).getTime(); return isNaN(t)?0:t; }
  if(typeof v.toDate === 'function'){ return v.toDate().getTime(); }
  if(typeof v.seconds === 'number'){ return v.seconds*1000; }
  return 0;
}

// REALTIME
onSnapshot(collection(db,'customers'),snap=>{
  allCus=[];
  snap.forEach(d=>allCus.push({phone:d.id,...d.data()}));
  // เดิมใช้ .localeCompare() ตรงๆ — ถ้ามีลูกค้าคนไหน updatedAt เป็น Firestore Timestamp object (ไม่ใช่ string)
  // จะ error ทันทีจนทั้งลิสต์ไม่ขึ้นเลย ทั้งที่ข้อมูลมีอยู่จริงในฐานข้อมูล — แก้ให้แปลงเป็นตัวเลขก่อนเทียบเสมอ
  allCus.sort((a,b)=>toMillis(b.updatedAt||b.createdAt)-toMillis(a.updatedAt||a.createdAt));
  updateStats();render(curQ?allCus.filter(c=>(c.name||'').toLowerCase().includes(curQ)||(c.phone||'').includes(curQ)):allCus);
},e=>{document.getElementById('cusList').innerHTML=`<div class="lt">โหลดไม่ได้: ${e.message}</div>`;});

function updateStats(){
  document.getElementById('cusCount').textContent=allCus.length;
  document.getElementById('stTotal').textContent=allCus.length;
  const nw=allCus.filter(c=>{const ms=toMillis(c.createdAt);return ms&&new Date(ms).toDateString()===today;}).length;
  document.getElementById('stNew').textContent=nw;
  document.getElementById('stAddr').textContent=allCus.filter(c=>c.address).length;
}
function render(list){
  const el=document.getElementById('cusList');
  if(!list.length){el.innerHTML='<div class="lt">ไม่พบลูกค้า</div>';return;}
  el.innerHTML=list.map(c=>{
    const init=(c.name||c.phone||'?').slice(0,1).toUpperCase();
    const isNew=toMillis(c.createdAt)&&new Date(toMillis(c.createdAt)).toDateString()===today;
    return `<div class="card" data-phone="${c.phone}"><div class="ct"><div class="av">${init}</div><div class="ci"><div class="cn">${esc(c.name||'-')}</div><div class="cp">${c.phone}</div></div><div class="bdg ${isNew?'new':'reg'}">${isNew?'ใหม่':'ลงทะเบียน'}</div></div>${c.address?`<div class="ca"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg><span>${esc(c.address)}</span></div>`:''}</div>`;
  }).join('');
  document.querySelectorAll('.card').forEach(card=>card.addEventListener('click',()=>openDet(card.dataset.phone)));
}

// SEARCH
document.getElementById('srchBox').addEventListener('input',e=>{
  curQ=e.target.value.toLowerCase();
  render(curQ?allCus.filter(c=>(c.name||'').toLowerCase().includes(curQ)||(c.phone||'').includes(curQ)):allCus);
});

// DETAIL
function openDet(phone){
  selCus=allCus.find(c=>c.phone===phone);if(!selCus)return;
  document.getElementById('dAv').textContent=(selCus.name||selCus.phone||'?').slice(0,1).toUpperCase();
  document.getElementById('dNm').textContent=selCus.name||'-';
  document.getElementById('dPh').textContent=selCus.phone;
  document.getElementById('dAddr').textContent=selCus.address||'ยังไม่มีที่อยู่';
  const ts=selCus.updatedAt||selCus.createdAt;
  document.getElementById('dDate').textContent=toMillis(ts)?new Date(toMillis(ts)).toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'}):'-';
  document.getElementById('detMask').classList.add('show');
}
document.getElementById('detClose').onclick=()=>document.getElementById('detMask').classList.remove('show');
document.getElementById('detCloseBtn').onclick=()=>document.getElementById('detMask').classList.remove('show');
document.getElementById('orderBtn').onclick=()=>{if(selCus){sessionStorage.setItem('preselCus',JSON.stringify(selCus));location.href='order-create.html';}};
document.getElementById('delCusBtn').onclick=async()=>{
  if(!selCus) return;
  if(!confirm(`ลบข้อมูลลูกค้า "${selCus.name||selCus.phone}" (${selCus.phone}) ออกจากระบบถาวร?\n\nใช้สำหรับกรณีข้อมูลผิดพลาด/ทดสอบ กู้คืนไม่ได้`)) return;
  try{
    await deleteDoc(doc(db,'customers',selCus.phone));
    document.getElementById('detMask').classList.remove('show');
  }catch(e){ alert('ลบไม่สำเร็จ: '+e.message); }
};

// ADD
function initFormMap(){
  if(fMap){fMap.remove();fMap=null;}
  fMap=L.map('fMap').setView([fLat,fLng],15);
  const satelliteLayer=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Tiles &copy; Esri',maxZoom:19,maxNativeZoom:19});
  const streetLayer=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19});
  satelliteLayer.addTo(fMap);
  L.control.layers({'ดาวเทียม':satelliteLayer,'แผนที่ถนน':streetLayer}, null, {position:'topright'}).addTo(fMap);
  fMarker=L.marker([fLat,fLng],{draggable:true}).addTo(fMap);
  fMarker.on('dragend',e=>{fLat=e.target.getLatLng().lat;fLng=e.target.getLatLng().lng;});
  // ใช้ click แตะปักหมุด (ไม่ใช้ contextmenu — บนมือถือแตะจอธรรมดาจะไม่ตรงกับตำแหน่งที่แตะจริง)
  fMap.on('click',e=>{fLat=e.latlng.lat;fLng=e.latlng.lng;fMarker.setLatLng(e.latlng);});
  setTimeout(()=>fMap?.invalidateSize(),300);
  setTimeout(()=>fMap?.invalidateSize(),1000);
}
document.getElementById('addBtn').onclick=()=>{
  editMode=false;
  document.getElementById('addMaskTitle').textContent='เพิ่มลูกค้าใหม่';
  document.getElementById('saveBtn').textContent='บันทึกลูกค้า';
  document.getElementById('fName').value='';
  document.getElementById('fPhone').value='';
  document.getElementById('fPhone').readOnly=false;
  document.getElementById('fPhone').style.background='';
  document.getElementById('fAddr').value='';
  fLat=13.7563; fLng=100.5018;
  document.getElementById('addMask').classList.add('show');
  setTimeout(()=>{
    document.getElementById('fPhone').focus();
    initFormMap();
  },300);
};
document.getElementById('editCusBtn').onclick=()=>{
  if(!selCus) return;
  editMode=true;
  document.getElementById('detMask').classList.remove('show');
  document.getElementById('addMaskTitle').textContent='แก้ไขข้อมูลลูกค้า';
  document.getElementById('saveBtn').textContent='บันทึกการแก้ไข';
  document.getElementById('fName').value=selCus.name||'';
  document.getElementById('fPhone').value=selCus.phone||'';
  document.getElementById('fPhone').readOnly=true; // เปลี่ยนเบอร์ไม่ได้ตรงนี้ เพราะเบอร์คือ id ของเอกสาร
  document.getElementById('fPhone').style.background='var(--gray,#f1f5f9)';
  document.getElementById('fAddr').value=selCus.address||'';
  fLat=selCus.lat||13.7563; fLng=selCus.lng||100.5018;
  document.getElementById('addMask').classList.add('show');
  setTimeout(()=>{ initFormMap(); },300);
};
document.getElementById('addClose').onclick=()=>document.getElementById('addMask').classList.remove('show');
document.getElementById('locBtn').onclick=()=>{
  navigator.geolocation.getCurrentPosition(p=>{
    fLat=p.coords.latitude;fLng=p.coords.longitude;
    fMap?.setView([fLat,fLng],16);fMarker?.setLatLng([fLat,fLng]);
  },()=>alert('ไม่สามารถเข้าถึง GPS'));
};
document.getElementById('saveBtn').onclick=async()=>{
  const name=document.getElementById('fName').value.trim();
  const addr=document.getElementById('fAddr').value.trim();
  if(editMode){
    if(!selCus) return;
    try{
      await setDoc(doc(db,'customers',selCus.phone),{name:name||'',address:addr||'',lat:fLat||null,lng:fLng||null,updatedAt:new Date().toISOString()},{merge:true});
      document.getElementById('addMask').classList.remove('show');
      alert('บันทึกการแก้ไขแล้ว');
    }catch(e){alert('เกิดข้อผิดพลาด: '+e.message);}
    return;
  }
  const phone=document.getElementById('fPhone').value.trim().replace(/\D/g,'');
  if(!phone||phone.length<8){alert('กรุณากรอกเบอร์โทรให้ถูกต้อง');return;}
  try{
    await setDoc(doc(db,'customers',phone),{name:name||'',address:addr||'',lat:fLat||null,lng:fLng||null,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),createdBy:'admin'},{merge:true});
    document.getElementById('addMask').classList.remove('show');
    alert('เพิ่มลูกค้า '+(name||phone)+' แล้ว');
  }catch(e){alert('เกิดข้อผิดพลาด: '+e.message);}
};
</script>
</body>
</html>
