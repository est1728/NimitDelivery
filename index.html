<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimit Delivery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:linear-gradient(135deg,#0c4aa6,#083570);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:24px;padding:32px 24px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.logo{font-size:28px;font-weight:900;color:#0c4aa6;text-align:center;margin-bottom:6px;letter-spacing:-0.5px;}
.sub{font-size:14px;color:#64748b;text-align:center;margin-bottom:28px;}
.label{font-size:13px;font-weight:700;color:#475569;margin-bottom:6px;}
.input{width:100%;height:52px;border:2px solid #e2e8f0;border-radius:14px;padding:0 16px;font-size:18px;font-weight:700;letter-spacing:2px;outline:none;color:#0f172a;transition:border .2s;}
.input:focus{border-color:#0c4aa6;}
.btn{width:100%;height:52px;border:none;border-radius:14px;background:linear-gradient(135deg,#0c4aa6,#083570);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:14px;}
.btn:disabled{background:#cbd5e1;cursor:not-allowed;}
.err{color:#dc2626;font-size:13px;font-weight:700;text-align:center;margin-top:10px;display:none;}
.saved{font-size:12px;color:#0c4aa6;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🍱 Nimit</div>
  <div class="sub">สั่งอาหารส่งถึงบ้าน</div>
  <div class="label">เบอร์โทรศัพท์</div>
  <input class="input" id="phone" type="tel" maxlength="15" placeholder="0812345678">
  <div class="saved" id="saved" style="display:none"></div>
  <button class="btn" id="btn" onclick="go()">เข้าสู่ระบบ</button>
  <div class="err" id="err">กรุณากรอกเบอร์โทรศัพท์</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const db = getFirestore(initializeApp({apiKey:"AIzaSyCnBUk0ZKFcwMK0NyYkheux1xPt9bLYhr4",authDomain:"nimit-delivery.firebaseapp.com",projectId:"nimit-delivery",storageBucket:"nimit-delivery.firebasestorage.app",messagingSenderId:"233476256130",appId:"1:233476256130:web:62ba8f64ad0bf2f92c9f9b"}));

// ถ้าล็อกอินแล้วและมีที่อยู่ → ไป shops ทันที
const phone = localStorage.getItem("customerPhone");
const addrs = JSON.parse(localStorage.getItem("addresses")||"[]");
if(phone && addrs.length > 0 && !["KJNFY63ESTC_C","KJNFY63ESTC_CUI"].includes(phone)){
  location.replace("shops.html");
} else if(phone) {
  document.getElementById("phone").value = phone;
  document.getElementById("saved").style.display = "block";
  document.getElementById("saved").textContent = "เบอร์ที่จำไว้: "+phone;
}

window.go = async function(){
  const p = document.getElementById("phone").value.trim();
  if(!p){ document.getElementById("err").style.display="block"; return; }
  document.getElementById("err").style.display="none";
  // admin/dev shortcuts
  if(p === "KJNFY63ESTC_C"){ location.href="admin.html"; return; }
  if(p === "KJNFY63ESTC_CUI"){ location.href="developer.html"; return; }
  const btn = document.getElementById("btn");
  btn.disabled=true; btn.textContent="กำลังเข้า...";
  localStorage.setItem("customerPhone", p);
  try{
    const snap = await getDoc(doc(db,"customers",p));
    if(snap.exists()){
      const d=snap.data();
      localStorage.setItem("customerData", JSON.stringify(d));
      if(d.address && !addrs.length){
        localStorage.setItem("addresses", JSON.stringify([{name:d.name||"",phone:p,address:d.address,lat:d.lat||null,lng:d.lng||null}]));
        localStorage.setItem("defaultAddress","0");
      }
      location.href = "shops.html";
    } else {
      sessionStorage.setItem("newCustomer","1");
      sessionStorage.setItem("addrBack","shops.html");
      location.href = "address.html";
    }
  }catch(e){
    sessionStorage.setItem("addrBack","shops.html");
    location.href = "address.html";
  }
};

document.getElementById("phone").addEventListener("keydown", e=>{ if(e.key==="Enter") window.go(); });
</script>
</body>
</html>
