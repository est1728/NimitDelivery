<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<title>ข้อมูลจัดส่ง - Nimit Delivery</title>
<style>
:root{
  --primary:#0c4aa6; --primary-dark:#083570; --primary-light:#e8f0fe;
  --gray:#f5f6f8; --text:#0f172a; --subtext:#64748b;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;}
body{background:#fff;min-height:100vh;padding-bottom:100px;}

.topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:100;}
.back-btn{width:38px;height:38px;border:none;background:var(--gray);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.back-btn svg{width:18px;height:18px;fill:none;stroke:var(--text);stroke-width:2.5;}
.topbar-title{font-size:17px;font-weight:800;color:var(--text);}

.container{padding:20px;}

.section-title{font-size:12px;font-weight:700;color:var(--subtext);text-transform:uppercase;letter-spacing:0.5px;margin:20px 0 10px;}

.input-group{margin-bottom:14px;}
.input-label{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;}
.input{width:100%;height:52px;border:2px solid #e8e8e8;border-radius:14px;padding:0 16px;font-size:15px;outline:none;transition:border 0.2s;background:#fff;}
.input:focus{border-color:var(--primary);}
textarea.input{height:90px;padding:12px 16px;resize:none;line-height:1.5;}

.map-wrapper{position:relative;border-radius:14px;overflow:hidden;border:2px solid #e8e8e8;}
#map{height:260px;width:100%;}
.gps-btn{position:absolute;top:10px;right:10px;z-index:999;width:44px;height:44px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.gps-btn svg{width:22px;height:22px;fill:var(--primary);}
.coords-box{margin-top:10px;padding:10px 14px;background:var(--primary-light);border-radius:12px;font-size:13px;color:var(--primary);display:none;font-weight:700;}
.hint{font-size:12px;color:var(--subtext);margin-top:8px;}

.save-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 16px 26px;background:#fff;border-top:1px solid #f0f0f0;}
.save-bar button{width:100%;height:54px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(12,74,166,0.3);}
.save-bar button:disabled{background:#c5cfe8;box-shadow:none;cursor:not-allowed;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
  <div class="topbar-title">ข้อมูลจัดส่ง</div>
</div>

<div class="container">
  <div class="section-title">ข้อมูลส่วนตัว</div>
  <div class="input-group">
    <div class="input-label">ชื่อ-นามสกุล</div>
    <input class="input" id="name" type="text" placeholder="เช่น คุณนิด" oninput="checkForm()">
  </div>
  <div class="input-group">
    <div class="input-label">รายละเอียดที่อยู่</div>
    <textarea class="input" id="address" placeholder="บ้านเลขที่ / หมู่ / ซอย / จุดสังเกต" oninput="checkForm()"></textarea>
  </div>

  <div class="section-title">ตำแหน่งจัดส่ง</div>
  <div class="map-wrapper">
    <div id="map"></div>
    <button class="gps-btn" onclick="getMyLocation()">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 17.93V18a1 1 0 0 0-2 0v1.93A8 8 0 0 1 4.07 13H6a1 1 0 0 0 0-2H4.07A8 8 0 0 1 11 4.07V6a1 1 0 0 0 2 0V4.07A8 8 0 0 1 19.93 11H18a1 1 0 0 0 0 2h1.93A8 8 0 0 1 13 19.93zM12 9a3 3 0 1 0 3 3 3 3 0 0 0-3-3z"/></svg>
    </button>
  </div>
  <div class="hint">แตะแผนที่เพื่อปักหมุด หรือกดปุ่มใช้ตำแหน่งปัจจุบัน</div>
  <div class="coords-box" id="coordsBox"><span id="coordsText"></span></div>
</div>

<div class="save-bar">
  <button id="saveBtn" onclick="saveData()" disabled>บันทึกข้อมูล</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnBUk0ZKFcwMK0NyYkheux1xPt9bLYhr4",
  authDomain:"nimit-delivery.firebaseapp.com",
  projectId:"nimit-delivery",
  storageBucket:"nimit-delivery.firebasestorage.app",
  messagingSenderId:"233476256130",
  appId:"1:233476256130:web:62ba8f64ad0bf2f92c9f9b"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const map = L.map('map').setView([13.7563,100.5018],13);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

let marker, selectedLat=null, selectedLng=null;

function placeMarker(lat,lng){
  if(marker) map.removeLayer(marker);
  marker=L.marker([lat,lng]).addTo(map);
  map.setView([lat,lng],16);
  selectedLat=lat; selectedLng=lng;
  document.getElementById("coordsText").textContent=`${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  document.getElementById("coordsBox").style.display="block";
  checkForm();
}

map.on('click',e=>placeMarker(e.latlng.lat,e.latlng.lng));

window.getMyLocation=function(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos=>placeMarker(pos.coords.latitude,pos.coords.longitude),
    ()=>alert("ไม่สามารถเข้าถึง GPS ได้")
  );
}

window.checkForm=function(){
  const name=document.getElementById("name").value.trim();
  const address=document.getElementById("address").value.trim();
  document.getElementById("saveBtn").disabled=!(name&&address&&selectedLat);
}

window.saveData=async function(){
  const phone=localStorage.getItem("customerPhone");
  const name=document.getElementById("name").value.trim();
  const address=document.getElementById("address").value.trim();
  const customerData={phone,name,address,lat:selectedLat,lng:selectedLng,createdAt:new Date().toISOString()};
  try{
    await setDoc(doc(db,"customers",phone),customerData);
    localStorage.setItem("customerData",JSON.stringify(customerData));
    window.location.href="address.html";
  }catch(e){ alert("เกิดข้อผิดพลาด กรุณาลองใหม่"); }
}
</script>
</body>
</html>
