<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รีวิว</title>
<style>
:root{--p:#0c4aa6;--pd:#083570;--pl:#e8f0fe;--g:#f5f6f8;--t:#0f172a;--s:#64748b;--y:#f59e0b;--gn:#16a34a;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:var(--g);min-height:100vh;padding-bottom:32px;}
.hd{background:linear-gradient(135deg,var(--p),var(--pd));padding:14px 16px;display:flex;align-items:center;gap:12px;}
.back{width:38px;height:38px;border:none;background:rgba(255,255,255,.18);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.back svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;}
.hd-info{flex:1;}
.hd-name{font-size:17px;font-weight:800;color:#fff;}
.hd-sub{font-size:12px;color:rgba(255,255,255,.75);}

/* SUMMARY CARD */
.sum-card{background:#fff;margin:16px;border-radius:20px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);display:flex;align-items:center;gap:20px;}
.star-big{text-align:center;flex-shrink:0;}
.star-num{font-size:48px;font-weight:900;color:var(--t);line-height:1;}
.star-ico{font-size:22px;color:var(--y);}
.star-count{font-size:12px;color:var(--s);margin-top:4px;}

/* DONUT CHART */
.donut-wrap{flex-shrink:0;position:relative;width:100px;height:100px;}
.donut-svg{transform:rotate(-90deg);}
.donut-bg{fill:none;stroke:#f1f5f9;stroke-width:12;}
.donut-ring{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dasharray .8s ease;}
.donut-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-pct{font-size:16px;font-weight:800;color:var(--t);}
.donut-sub{font-size:10px;color:var(--s);}

/* BARS */
.bars{flex:1;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bar-lbl{font-size:11px;font-weight:700;color:var(--s);width:16px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:var(--y);transition:width .8s ease;}
.bar-count{font-size:10px;color:var(--s);width:20px;text-align:right;flex-shrink:0;}

/* REVIEWS LIST */
.sec-hd{padding:0 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.sec-t{font-size:15px;font-weight:800;color:var(--t);}
.sec-cnt{font-size:13px;color:var(--s);}
.rev-card{background:#fff;margin:0 16px 10px;border-radius:16px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.rev-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.rev-stars{color:var(--y);font-size:14px;letter-spacing:1px;}
.rev-date{font-size:11px;color:var(--s);}
.rev-order{font-size:12px;font-weight:700;color:var(--p);margin-bottom:6px;}
.rev-text{font-size:14px;color:var(--t);line-height:1.6;}
.rev-empty{text-align:center;padding:48px 20px;color:var(--s);}
.rev-empty svg{width:48px;height:48px;fill:#cbd5e1;display:block;margin:0 auto 12px;}
.lt{text-align:center;padding:40px;color:var(--s);}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid #f1f5f9;margin-bottom:4px;}
.tab-btn{flex:1;height:44px;border:none;background:none;font-size:14px;font-weight:700;color:var(--s);cursor:pointer;position:relative;}
.tab-btn.on{color:var(--p);}
.tab-btn.on::after{content:'';position:absolute;bottom:-2px;left:16px;right:16px;height:2px;background:var(--p);border-radius:1px;}
</style>
</head>
<body>

<div class="hd">
  <button class="back" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>
  <div class="hd-info">
    <div class="hd-name" id="hdName">รีวิว</div>
    <div class="hd-sub" id="hdSub">กำลังโหลด...</div>
  </div>
</div>

<!-- TABS (ถ้าเป็น order ที่มีทั้งร้านและไรเดอร์) -->
<div class="tabs" id="tabsEl" style="display:none">
  <button class="tab-btn on" id="tab-shop" onclick="window.switchTab('shop')">ร้านค้า</button>
  <button class="tab-btn" id="tab-rider" onclick="window.switchTab('rider')">ไรเดอร์</button>
</div>

<!-- SUMMARY -->
<div id="sumEl"><div class="lt">กำลังโหลด...</div></div>

<!-- LIST -->
<div class="sec-hd" id="listHd" style="display:none">
  <span class="sec-t">รีวิวทั้งหมด</span>
  <span class="sec-cnt" id="listCnt"></span>
</div>
<div id="listEl"></div>

<script>
['switchTab'].forEach(fn=>{window[fn]=window[fn]||function(){};});
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCnBUk0ZKFcwMK0NyYkheux1xPt9bLYhr4",
  authDomain:"nimit-delivery.firebaseapp.com",
  projectId:"nimit-delivery",
  storageBucket:"nimit-delivery.firebasestorage.app",
  messagingSenderId:"233476256130",
  appId:"1:233476256130:web:62ba8f64ad0bf2f92c9f9b"
}));

const params = new URLSearchParams(location.search);
const type = params.get('type') || 'shop'; // shop | rider
const id = params.get('id') || '';
const name = params.get('name') || (type==='shop'?'ร้านค้า':'ไรเดอร์');

document.getElementById('hdName').textContent = name;
document.getElementById('hdSub').textContent = type==='shop'?'รีวิวร้านค้า':'รีวิวไรเดอร์';

let allReviews = [];

async function loadReviews(){
  try{
    const field = type==='shop'?'shopId':'riderId';
    const ratingField = type==='shop'?'shopRating':'riderRating';
    const commentField = type==='shop'?'shopComment':'riderComment';
    const snap = await getDocs(query(collection(db,'reviews'), where(field,'==',id)));
    allReviews = [];
    snap.forEach(d=>{
      const r = d.data();
      const rating = r[ratingField]||0;
      const comment = r[commentField]||'';
      if(rating > 0){
        allReviews.push({
          id:d.id, rating, comment,
          orderId:r.orderId||d.id,
          createdAt:r.createdAt?.toDate?r.createdAt.toDate():new Date()
        });
      }
    });
    allReviews.sort((a,b)=>b.createdAt-a.createdAt);
    renderSummary();
    renderList();
  }catch(e){
    document.getElementById('sumEl').innerHTML=`<div class="lt">โหลดไม่ได้: ${e.message}</div>`;
  }
}

function renderSummary(){
  const total = allReviews.length;
  const avg = total > 0 ? (allReviews.reduce((s,r)=>s+r.rating,0)/total) : 0;
  const dist = [0,0,0,0,0]; // index 0=1star, 4=5star
  allReviews.forEach(r=>{ if(r.rating>=1&&r.rating<=5) dist[r.rating-1]++; });
  const pct5 = total>0?Math.round((dist[4]/total)*100):0; // % ของ 5 ดาว
  const avgStr = total>0?avg.toFixed(2):'0.00';
  const stars = '★'.repeat(Math.round(avg)) + '☆'.repeat(5-Math.round(avg));

  // SVG donut
  const R=36, C=2*Math.PI*R, pctFill=total>0?(avg/5)*C:0;
  const color = avg>=4?'#16a34a':avg>=3?'#f59e0b':'#ef4444';

  document.getElementById('sumEl').innerHTML=`
    <div class="sum-card">
      <div class="star-big">
        <div class="star-num">${avgStr}</div>
        <div class="star-ico">${'★'.repeat(Math.max(0,Math.round(avg)))}${'☆'.repeat(Math.max(0,5-Math.round(avg)))}</div>
        <div class="star-count">${total} รีวิว</div>
      </div>
      <div class="donut-wrap">
        <svg class="donut-svg" width="100" height="100" viewBox="0 0 100 100">
          <circle class="donut-bg" cx="50" cy="50" r="${R}"/>
          <circle class="donut-ring" cx="50" cy="50" r="${R}"
            stroke="${color}"
            stroke-dasharray="${pctFill.toFixed(1)} ${(C-pctFill).toFixed(1)}"
            stroke-dashoffset="0"/>
        </svg>
        <div class="donut-label">
          <div class="donut-pct">${Math.round(avg/5*100)}%</div>
          <div class="donut-sub">คะแนน</div>
        </div>
      </div>
      <div class="bars">
        ${[5,4,3,2,1].map(s=>{
          const cnt=dist[s-1];
          const w=total>0?Math.round(cnt/total*100):0;
          return `<div class="bar-row">
            <div class="bar-lbl">${s}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div>
            <div class="bar-count">${cnt}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  document.getElementById('listHd').style.display='flex';
  document.getElementById('listCnt').textContent = total+' รายการ';
}

function renderList(){
  if(!allReviews.length){
    document.getElementById('listEl').innerHTML=`
      <div class="rev-empty">
        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        <div style="font-size:15px;font-weight:700;color:var(--t);margin-bottom:6px">ยังไม่มีรีวิว</div>
        <div style="font-size:13px">รอรีวิวจากลูกค้า</div>
      </div>`;
    return;
  }
  document.getElementById('listEl').innerHTML = allReviews.map(r=>{
    const stars='★'.repeat(r.rating)+'☆'.repeat(5-r.rating);
    const date=r.createdAt.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
    return `<div class="rev-card">
      <div class="rev-top">
        <div class="rev-stars">${stars}</div>
        <div class="rev-date">${date}</div>
      </div>
      <div class="rev-order">ออเดอร์ ${r.orderId}</div>
      ${r.comment?`<div class="rev-text">${esc(r.comment)}</div>`:'<div class="rev-text" style="color:var(--s);font-style:italic">ไม่มีความคิดเห็น</div>'}
    </div>`;
  }).join('');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
window.switchTab=function(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
};

loadReviews();
</script>
</body>
</html>
