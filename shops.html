<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimit Delivery</title>
<style>
:root{--primary:#0c4aa6;--primary-dark:#083570;--primary-light:#e8f0fe;--gray:#f5f6f8;--text:#0f172a;--subtext:#64748b;--green:#16a34a;--green-light:#dcfce7;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--gray);min-height:100vh;padding-bottom:28px;}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:12px 16px;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.addr-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border-radius:20px;padding:6px 12px;cursor:pointer;}
.addr-chip svg{width:13px;height:13px;fill:#fff;flex-shrink:0;}
.addr-chip-txt{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.cart-btn{position:relative;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.18);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cart-btn svg{width:20px;height:20px;fill:#fff;display:block;}
.cart-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:20px;display:none;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--primary-dark);pointer-events:none;}
.search-wrap{position:relative;margin-top:2px;}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;pointer-events:none;fill:none;stroke:#94a3b8;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.search-box{width:100%;height:44px;border:none;border-radius:22px;background:#fff;padding:0 16px 0 42px;font-size:15px;outline:none;color:var(--text);}
.search-box::placeholder{color:#b0b8c1;}

/* ADS */
.ads-section{background:#fff;}
.ads-track-wrap{overflow:hidden;user-select:none;cursor:grab;}
.ads-track-wrap:active{cursor:grabbing;}
.ads-track{display:flex;will-change:transform;}
.ad-slide{min-width:100%;flex-shrink:0;}
.ad-card{width:100%;height:220px;position:relative;overflow:hidden;cursor:pointer;}
.ad-card img{width:100%;height:100%;object-fit:cover;display:block;}
.ad-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;}
.ad-placeholder svg{width:40px;height:40px;fill:rgba(255,255,255,.4);}
.ad-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.6));padding:28px 16px 14px;font-size:16px;font-weight:800;color:#fff;}
.ads-dots{display:flex;justify-content:center;gap:6px;padding:8px 0 6px;background:#fff;}
.ads-dot{width:6px;height:6px;border-radius:3px;background:#e2e8f0;cursor:pointer;transition:all .3s;}
.ads-dot.on{background:var(--primary);width:18px;}

/* ACTIVE ORDER */
.active-order{margin:12px 16px 0;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:18px;padding:14px 16px;cursor:pointer;display:none;box-shadow:0 4px 16px rgba(12,74,166,.25);}
.ao-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ao-id{font-size:14px;font-weight:800;color:#fff;}
.ao-badge{font-size:10px;font-weight:700;background:rgba(255,255,255,.2);color:#fff;padding:3px 10px;border-radius:20px;}
.ao-shop{font-size:12px;color:rgba(255,255,255,.85);margin-bottom:8px;}
.ao-progress{display:flex;gap:4px;margin-bottom:10px;}
.ao-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.2);}
.ao-dot.done{background:#4ade80;}
.ao-dot.cur{background:#fff;}
.ao-footer{display:flex;align-items:center;justify-content:space-between;}
.ao-status{font-size:13px;font-weight:700;color:rgba(255,255,255,.95);}
.ao-arrow{font-size:12px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:2px;}
.ao-arrow svg{width:14px;height:14px;fill:rgba(255,255,255,.7);}

/* POPULAR */
.section{margin-top:20px;}
.section-header{padding:0 16px 10px;display:flex;align-items:center;}
.section-title{font-size:17px;font-weight:800;color:var(--text);}
.section-title::before{content:"";display:inline-block;width:4px;height:18px;background:var(--primary);border-radius:2px;margin-right:8px;vertical-align:middle;}
.popular-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;}
.popular-scroll::-webkit-scrollbar{display:none;}
.pop-card{background:#fff;border-radius:16px;width:160px;flex-shrink:0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;}
.pop-card:active{opacity:.9;}
.pop-img{width:100%;height:115px;background:linear-gradient(135deg,#dde8fa,#c2d4f5);overflow:hidden;}
.pop-img img{width:100%;height:100%;object-fit:cover;display:block;}
.pop-body{padding:9px 11px 11px;}
.pop-name{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.pop-meta{font-size:11px;color:var(--subtext);}

/* SHOP CARDS */
.shops-grid{padding:0 16px;}
.shop-card{background:#fff;border-radius:20px;margin-bottom:12px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.shop-card:active{opacity:.92;}
.shop-card.closed{opacity:.5;pointer-events:none;}
.shop-banner{width:100%;height:130px;position:relative;overflow:hidden;}
.shop-banner img{width:100%;height:100%;object-fit:cover;display:block;}
.shop-banner-ph{width:100%;height:100%;background:linear-gradient(135deg,#dde8fa,#c2d4f5);}
.shop-status-badge{position:absolute;top:10px;right:10px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:800;}
.badge-open{background:var(--green-light);color:var(--green);}
.badge-closed{background:#fee2e2;color:#dc2626;}
.shop-body{padding:12px 14px 14px;}
.shop-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.shop-ava{width:46px;height:46px;border-radius:12px;overflow:hidden;background:var(--primary-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.1);}
.shop-ava img{width:100%;height:100%;object-fit:cover;}
.shop-ava svg{width:22px;height:22px;fill:var(--primary);}
.shop-info{flex:1;min-width:0;}
.shop-name{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shop-desc{font-size:12px;color:var(--subtext);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.shop-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.meta-item{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--subtext);}
.meta-item svg{width:12px;height:12px;fill:var(--subtext);}
.meta-item.star{color:#f59e0b;font-weight:700;}
.meta-item.star svg{fill:#f59e0b;}
.meta-item.fee{color:var(--green);font-weight:700;}
.meta-item.fee svg{fill:var(--green);}
.closed-label{font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;padding:16px 16px 8px;}
.loading{text-align:center;padding:40px;color:var(--subtext);font-size:14px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div class="logo">Nimit Delivery</div>
    <div class="topbar-right">
      <div class="addr-chip" onclick="sessionStorage.setItem('addrBack','shops.html');location.href='address.html'">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
        <div class="addr-chip-txt" id="addrTxt">ระบุที่อยู่</div>
      </div>
      <button class="cart-btn" onclick="location.href='cart.html'">
        <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM17 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.17 14l.94-2h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 19.97 3H5.21l-.94-2H1v2h2l3.6 7.59L5.25 13c-.16.28-.25.61-.25.96C5 15.1 5.9 16 7 16h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12z"/></svg>
        <div class="cart-badge" id="cartBadge">0</div>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <svg class="search-ico" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="7"/>
      <line x1="16.5" y1="16.5" x2="21" y2="21"/>
    </svg>
    <input class="search-box" id="search" placeholder="ค้นหาร้านอาหาร..." oninput="window.filterShops()">
  </div>
</div>

<!-- 1. ADS -->
<div class="ads-section" id="adsSection" style="display:none">
  <div class="ads-track-wrap" id="adsWrap">
    <div class="ads-track" id="adsTrack"></div>
  </div>
  <div class="ads-dots" id="adsDots"></div>
</div>

<!-- 2. ACTIVE ORDER (ระหว่าง ads กับ popular) -->
<div class="active-order" id="activeOrderCard" onclick="location.href='track.html'">
  <div class="ao-top">
    <div class="ao-id" id="aoId">-</div>
    <div class="ao-badge">กำลังดำเนินการ</div>
  </div>
  <div class="ao-shop" id="aoShop">-</div>
  <div class="ao-progress" id="aoProgress"></div>
  <div class="ao-footer">
    <span class="ao-status" id="aoStatus">-</span>
    <span class="ao-arrow">ดูรายละเอียด <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></span>
  </div>
</div>

<!-- 3. POPULAR -->
<div class="section" id="popularSection" style="display:none">
  <div class="section-header"><span class="section-title">ร้านยอดนิยม</span></div>
  <div class="popular-scroll" id="popularScroll"></div>
</div>

<!-- 4. ALL SHOPS -->
<div class="section">
  <div class="section-header"><span class="section-title" id="shopSectionTitle">ร้านทั้งหมด</span></div>
  <div id="shopsList"><div class="loading">กำลังโหลด...</div></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const db = getFirestore(initializeApp({apiKey:"AIzaSyCnBUk0ZKFcwMK0NyYkheux1xPt9bLYhr4",authDomain:"nimit-delivery.firebaseapp.com",projectId:"nimit-delivery",storageBucket:"nimit-delivery.firebasestorage.app",messagingSenderId:"233476256130",appId:"1:233476256130:web:62ba8f64ad0bf2f92c9f9b"}));

const SL={pending:"รอรับออเดอร์",accepted:"รับงานแล้ว",picking:"ไรเดอร์กำลังมา",arrived:"ถึงร้านแล้ว",delivering:"กำลังส่ง",done:"ส่งเสร็จแล้ว"};
const SS=["pending","accepted","picking","arrived","delivering","done"];
let allShops=[],userLat=null,userLng=null;

// CART
function updCart(){const cc=JSON.parse(localStorage.getItem('cart')||'{}');let q=0;Object.values(cc).forEach(s=>(s.items||[]).forEach(i=>q+=i.qty));const b=document.getElementById('cartBadge');if(b){b.textContent=q;b.style.display=q?'flex':'none';}}updCart();

// ADDRESS
// อ่านที่อยู่หลักจาก addresses (ระบบเดียวกับ checkout)
const _addrs=JSON.parse(localStorage.getItem("addresses")||"[]");
const _defIdx=parseInt(localStorage.getItem("defaultAddress")||"0");
const _defAddr=_addrs[_defIdx]||_addrs[0];
if(_defAddr){
  const a=_defAddr.address||'';
  document.getElementById("addrTxt").textContent=a.length>22?a.slice(0,22)+"...":a;
}

// ACTIVE ORDER
const ords=JSON.parse(localStorage.getItem("currentOrderDocs")||"[]");
if(ords.length && ords[0]?.docId){
  try{ onSnapshot(doc(db,"orders",ords[0].docId),snap=>{
    if(!snap.exists())return;
    const o=snap.data();
    const card=document.getElementById("activeOrderCard");
    const btn=document.getElementById("activeOrderCard");
    if(o.status==="done"||o.status==="rejected"){card.style.display="none";btn.style.display="none";return;}
    card.style.display="block";btn.style.display="flex";
    document.getElementById("aoId").textContent=o.orderId||"-";
    document.getElementById("aoShop").textContent=o.shopName||"-";
    document.getElementById("aoStatus").textContent=SL[o.status]||o.status;
    const idx=SS.indexOf(o.status);
    document.getElementById("aoProgress").innerHTML=SS.slice(0,-1).map((_,i)=>`<div class="ao-dot${i<idx?" done":i===idx?" cur":""}"></div>`).join("");
  }); }catch(e){ console.error("order listener:",e); }
}

// ADS with touch swipe
let curAd=0,totalAds=0,adTimer=null;
let touchStartX=0,touchStartTime=0,isDragging=false,startTranslate=0;

function goToAd(i,animate=true){
  curAd=Math.max(0,Math.min(i,totalAds-1));
  const track=document.getElementById("adsTrack");
  track.style.transition=animate?"transform .38s cubic-bezier(.4,0,.2,1)":"none";
  track.style.transform=`translateX(-${curAd*100}%)`;
  document.querySelectorAll(".ads-dot").forEach((d,j)=>d.classList.toggle("active",j===curAd));
}
window.goToAd=goToAd;

function startAdAuto(){
  if(adTimer)clearInterval(adTimer);
  if(totalAds<2)return;
  adTimer=setInterval(()=>goToAd((curAd+1)%totalAds),3500);
}
function resetAdAuto(){if(adTimer)clearInterval(adTimer);setTimeout(startAdAuto,1200);}

async function loadAds(){
  try{
    const snap=await getDocs(collection(db,"ads"));
    const ads=[];snap.forEach(d=>ads.push({id:d.id,...d.data()}));
    if(!ads.length)return;
    totalAds=ads.length;
    document.getElementById("adsWrap").style.display="block";
    document.getElementById("adsTrack").innerHTML=ads.map((ad,i)=>{
      const inner=ad.imgUrl?`<img src="${ad.imgUrl}">`:`<div class="ad-placeholder"><svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zm-9-7l-3 3.72L7 13l-4 5h18l-5-6.28z"/></svg><span>${ad.caption||"โฆษณา"}</span></div>`;
      const cap=ad.caption&&ad.imgUrl?`<div class="ad-caption">${ad.caption}</div>`:"";
      const sn=(ad.shopName||"").replace(/'/g,"\\'");
      return `<div class="ad-slide"><div class="ad-card" onclick="selectShop('${ad.shopId||""}','${sn}')">${inner}${cap}</div></div>`;
    }).join("");
    document.getElementById("adsDots").innerHTML=ads.map((_,i)=>`<div class="ads-dot${i===0?" active":""}" onclick="goToAd(${i})"></div>`).join("");

    // Touch swipe
    const wrap=document.getElementById("adsWrap");
    const track=document.getElementById("adsTrack");
    wrap.addEventListener("touchstart",e=>{
      touchStartX=e.touches[0].clientX;touchStartTime=Date.now();isDragging=true;
      startTranslate=curAd*wrap.offsetWidth;
      track.style.transition="none";
      if(adTimer)clearInterval(adTimer);
    },{passive:true});
    wrap.addEventListener("touchmove",e=>{
      if(!isDragging)return;
      const dx=e.touches[0].clientX-touchStartX;
      const tx=startTranslate-dx;
      const maxTx=(totalAds-1)*wrap.offsetWidth;
      track.style.transform=`translateX(-${Math.max(0,Math.min(tx,maxTx))}px)`;
    },{passive:true});
    wrap.addEventListener("touchend",e=>{
      if(!isDragging)return;isDragging=false;
      const dx=touchStartX-e.changedTouches[0].clientX;
      const dt=Date.now()-touchStartTime;
      const fast=Math.abs(dx)>40&&dt<300;
      const far=Math.abs(dx)>wrap.offsetWidth*0.35;
      if(fast||far){if(dx>0&&curAd<totalAds-1)goToAd(curAd+1);else if(dx<0&&curAd>0)goToAd(curAd-1);else goToAd(curAd);}
      else goToAd(curAd);
      resetAdAuto();
    });
    startAdAuto();
  }catch(e){}
}

// SHOPS
function calcDist(a,b,c,d){const R=6371,da=(c-a)*Math.PI/180,db=(d-b)*Math.PI/180;const x=Math.sin(da/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(db/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
async function loadShops(){
  document.getElementById("shopsList").innerHTML='<div class="loading">กำลังโหลด...</div>';
  try{
    const snap=await getDocs(collection(db,"shops"));
    allShops=[];
    snap.forEach(d=>{
      const s={id:d.id,...d.data()};
      allShops.push(s);
    });
    // โหลดเสร็จก่อน แล้วค่อย request location
    renderPopular();renderShops(allShops);
    navigator.geolocation?.getCurrentPosition(p=>{
      userLat=p.coords.latitude;userLng=p.coords.longitude;
      allShops.forEach(s=>{if(s.lat&&s.lng){s._dist=calcDist(userLat,userLng,s.lat,s.lng);s._fee=s._dist>1.5?9:0;}});
      renderShops(allShops);
    },()=>{},{timeout:3000});
  }catch(e){
    console.error('loadShops:',e);
    document.getElementById("shopsList").innerHTML='<div class="loading">โหลดไม่ได้ กรุณาลองใหม่</div>';
  }
}
function renderPopular(){
  const pop=allShops.filter(s=>s.isOpen&&(s.popular||(s.rating&&s.rating>=4.5))).slice(0,8);
  if(!pop.length)return;
  document.getElementById("popularSection").style.display="block";
  document.getElementById("popularScroll").innerHTML=pop.map(s=>{
    const sn=s.name.replace(/'/g,"\\'");
    const img=s.bannerUrl?`<img src="${s.bannerUrl}">`:"";
    const star=s.rating?`<span class="pop-star">★ ${s.rating}</span>`:"";
    return `<div class="pop-card" onclick="selectShop('${s.id}','${sn}')"><div class="pop-img">${img}</div><div class="pop-body"><div class="pop-name">${s.name}</div><div class="pop-row">${star}<span>${s.deliveryTime||"20-30"} นาที</span></div></div></div>`;
  }).join("");
}
function buildShopCard(s){
  const sn=s.name.replace(/'/g,"\\'").replace(/"/g,"&quot;");
  const oc=s.isOpen?`selectShop('${s.id}','${sn}')`:"";
  const banner=s.bannerUrl?`<img src="${s.bannerUrl}">`:`<div class="shop-banner-ph"></div>`;
  const ava=s.avatarUrl?`<img src="${s.avatarUrl}">`:`<svg viewBox="0 0 24 24"><path d="M20 4H4v2l8 5 8-5V4zm0 4.236l-8 5-8-5V20h16V8.236z"/></svg>`;
  const dist=s._dist!=null?`<div class="meta-item"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>${s._dist<1?"<1":s._dist.toFixed(1)} กม.</div>`:"";
  const fee=s._fee!=null?`<div class="meta-item fee"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>${s._fee===0?"ส่งฟรี":"ส่ง ฿"+s._fee}</div>`:"";
  const rating=s.rating?`<div class="meta-item star"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>${s.rating}</div>`:"";
  const time=`<div class="meta-item"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>${s.deliveryTime||"20-30"} นาที</div>`;
  const desc=s.desc?`<div class="shop-desc">${s.desc}</div>`:"";
  return `<div class="shop-card${s.isOpen?"":" closed"}" onclick="${oc}"><div class="shop-banner">${banner}<div class="shop-status-badge ${s.isOpen?"badge-open":"badge-closed"}">${s.isOpen?"เปิด":"ปิด"}</div></div><div class="shop-body"><div class="shop-ava">${ava}</div><div class="shop-info"><div class="shop-name">${s.name}</div>${desc}<div class="shop-meta">${dist}${time}${rating}${fee}</div></div></div></div>`;
}
function renderShops(shops){
  const open=shops.filter(s=>s.isOpen),closed=shops.filter(s=>!s.isOpen);
  if(!shops.length){document.getElementById("shopsList").innerHTML='<div class="loading">ไม่พบร้านค้า</div>';return;}
  document.getElementById("shopsList").innerHTML=
    `<div class="shops-grid">${open.map(buildShopCard).join("")}</div>`
    +(closed.length?`<div class="closed-label">ร้านที่ปิดอยู่</div><div class="shops-grid">${closed.map(buildShopCard).join("")}</div>`:"");
}
window.filterShops=function(){
  const q=document.getElementById("search").value.toLowerCase();
  const f=q?allShops.filter(s=>s.name.toLowerCase().includes(q)||(s.desc||"").toLowerCase().includes(q)):allShops;
  document.getElementById("shopSectionTitle").textContent=q?`ผลลัพธ์ ${f.length} ร้าน`:"ร้านค้าทั้งหมด";
  renderShops(f);
};
window.selectShop=function(id,name){if(!id)return;localStorage.setItem("selectedShopId",id);localStorage.setItem("selectedShopName",name);location.href="menu.html";};
loadAds();loadShops();

</script>
</body>
