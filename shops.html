<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เลือกร้าน - Nimit Delivery</title>
<style>
:root{
  --primary:#0c4aa6; --primary-dark:#083570; --primary-light:#e8f0fe;
  --gray:#f5f6f8; --text:#0f172a; --subtext:#64748b;
  --green:#16a34a; --green-light:#dcfce7;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.05);
  --shadow-md:0 4px 12px rgba(15,23,42,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--gray);min-height:100vh;padding-bottom:24px;}
.topbar{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:12px 16px;position:sticky;top:0;z-index:100;}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{font-size:18px;font-weight:800;color:#fff;}
.topbar-actions{display:flex;align-items:center;gap:8px;}
.order-status-btn{height:36px;padding:0 12px;border-radius:20px;background:rgba(255,255,255,0.18);border:none;cursor:pointer;display:none;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#fff;}
.order-status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.cart-icon-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.18);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
.cart-icon-btn svg{width:20px;height:20px;fill:#fff;}
.cart-badge{position:absolute;top:-3px;right:-3px;background:#ef4444;color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:20px;display:none;align-items:center;justify-content:center;padding:0 4px;}
.address-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.18);padding:7px 12px;border-radius:20px;cursor:pointer;max-width:220px;}
.address-chip svg{width:14px;height:14px;fill:#fff;flex-shrink:0;}
.address-chip-text{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.search-wrap{position:relative;margin-top:10px;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:none;stroke:rgba(255,255,255,0.8);stroke-width:2;}
.search-box{width:100%;height:44px;border:none;border-radius:12px;background:rgba(255,255,255,0.18);padding:0 16px 0 42px;font-size:15px;outline:none;color:#fff;}.search-box::placeholder{color:rgba(255,255,255,0.65);}
.active-order-card{margin:12px 16px 0;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:18px;padding:14px 16px;cursor:pointer;display:none;box-shadow:0 4px 14px rgba(12,74,166,0.25);}
.active-order-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.active-order-id{font-size:14px;font-weight:800;color:#fff;}
.active-order-badge{font-size:11px;font-weight:700;background:rgba(255,255,255,0.2);color:#fff;padding:3px 10px;border-radius:20px;}
.active-order-shop{font-size:13px;color:rgba(255,255,255,0.85);margin-bottom:8px;}
.active-order-progress{display:flex;gap:4px;}
.progress-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);}
.progress-dot.done{background:#4ade80;}
.progress-dot.active-dot{background:#fff;}
.active-order-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.active-order-status{font-size:13px;color:rgba(255,255,255,0.9);font-weight:600;}
.active-order-arrow{font-size:12px;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:4px;}
.active-order-arrow svg{width:14px;height:14px;fill:rgba(255,255,255,0.7);}
.section-head{padding:20px 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.section-title-text{font-size:17px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px;}.section-title-text::before{content:"";width:4px;height:20px;background:var(--primary);border-radius:2px;display:inline-block;}
.ads-wrap{overflow:hidden;position:relative;margin-bottom:8px;}
.ads-track{display:flex;transition:transform 0.5s ease;}
.ad-slide{min-width:100%;padding:0 16px;box-sizing:border-box;}
.ad-card{width:100%;height:220px;border-radius:18px;overflow:hidden;cursor:pointer;position:relative;box-shadow:0 4px 16px rgba(12,74,166,0.15);}
.ad-card img{width:100%;height:100%;object-fit:cover;}
.ad-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.ad-placeholder svg{width:28px;height:28px;fill:rgba(255,255,255,0.6);}
.ad-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,0.65),transparent);padding:28px 16px 14px;font-size:16px;font-weight:800;color:#fff;}
.ads-dots{display:flex;justify-content:center;gap:6px;padding:8px 0;}
.ads-dot{width:6px;height:6px;border-radius:50%;background:#cbd5e1;transition:all 0.3s;cursor:pointer;}
.ads-dot.active{background:var(--primary);width:18px;border-radius:3px;}
.popular-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;}
.popular-scroll::-webkit-scrollbar{display:none;}
.popular-card{background:#fff;border-radius:18px;width:160px;flex-shrink:0;overflow:hidden;box-shadow:var(--shadow-md);cursor:pointer;transition:transform 0.12s;}
.popular-card-img{width:100%;height:120px;background:var(--gray);overflow:hidden;}
.popular-card-img img{width:100%;height:100%;object-fit:cover;}
.popular-card-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#dde8fa,#c2d4f5);}
.popular-card-body{padding:10px 12px 12px;}
.popular-card-name{font-size:14px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.popular-card-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--subtext);margin:3px 0;}
.pop-star{color:#f59e0b;font-weight:700;}
.popular-card-meta{font-size:11px;color:var(--subtext);}
.shops-list{display:flex;flex-direction:column;gap:12px;padding:0 16px;}
.shop-card{background:#fff;border-radius:20px;box-shadow:var(--shadow-md);cursor:pointer;}
.shop-card.closed{opacity:0.55;cursor:default;}
.shop-banner{width:100%;height:110px;position:relative;overflow:hidden;border-radius:20px 20px 0 0;}
.shop-banner img{width:100%;height:100%;object-fit:cover;}
.shop-banner-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#dde8fa,#c2d4f5);}
.shop-status-badge{position:absolute;top:10px;right:10px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.badge-open{background:#dcfce7;color:#16a34a;}
.badge-closed{background:#fee2e2;color:#dc2626;}
.shop-profile-row{background:#fff;padding:0 16px;position:relative;height:34px;}
.shop-avatar{position:absolute;top:-26px;left:16px;width:56px;height:56px;border-radius:16px;border:3px solid #fff;background:var(--primary-light);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;}
.shop-avatar img{width:100%;height:100%;object-fit:cover;}
.shop-avatar svg{width:24px;height:24px;fill:var(--primary);}
.shop-info{background:#fff;padding:0 16px 14px;border-radius:0 0 20px 20px;}
.shop-name{font-size:16px;font-weight:800;color:var(--text);margin-bottom:3px;}
.shop-desc{font-size:13px;color:var(--subtext);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shop-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--subtext);margin-top:4px;}
.shop-meta-item{display:flex;align-items:center;gap:4px;}
.shop-meta-item svg{width:13px;height:13px;fill:var(--subtext);}
.shop-meta-item.star{color:#f59e0b;font-weight:700;}
.shop-meta-item.star svg{fill:#f59e0b;}
.shop-meta-item.open-hours{color:var(--green);}
.shop-meta-item.open-hours svg{fill:var(--green);}
.closed-label{padding:4px 16px 8px;font-size:12px;font-weight:700;color:var(--subtext);text-transform:uppercase;letter-spacing:0.5px;}
.loading{text-align:center;padding:40px;color:var(--subtext);font-size:14px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row1">
    <div class="logo">Nimit Delivery</div>
    <div class="topbar-actions">
      <button class="order-status-btn" id="orderStatusBtn" onclick="window.location.href='track.html'">
        <div class="order-status-dot"></div>ดูออเดอร์
      </button>
      <button class="cart-icon-btn" onclick="window.location.href='cart.html'">
        <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM17 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.17 14l.94-2h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 19.97 3H5.21l-.94-2H1v2h2l3.6 7.59L5.25 13c-.16.28-.25.61-.25.96C5 15.1 5.9 16 7 16h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12z"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>

  <div class="address-chip" onclick="window.location.href='register.html'">

    <div class="address-chip-text" id="addressChipText">กรอกที่อยู่จัดส่ง</div>

<div class="active-order-card" id="activeOrderCard" onclick="window.location.href='track.html'">
  <div class="active-order-top">

  </div>
  <div class="active-order-shop" id="activeOrderShop">ร้าน...</div>
  <div class="active-order-progress" id="activeOrderProgress"></div>
  <div class="active-order-footer">
    <div class="active-order-status" id="activeOrderStatus">รอรับออเดอร์</div>
    <div class="active-order-arrow">ดูรายละเอียด<svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
  </div>
</div>

<div id="adsSection" style="display:none">
  <div class="section-head"><div class="section-title-text">โฆษณา</div></div>
  <div class="ads-wrap"><div class="ads-track" id="adsTrack"></div></div>
  <div class="ads-dots" id="adsDots"></div>
</div>

<div id="popularSection" style="display:none;background:#fff;padding:8px 0 16px;margin-bottom:8px;">
  <div class="section-head"><div class="section-title-text">ร้านยอดนิยม</div></div>
  <div class="popular-scroll" id="popularScroll"></div>
</div>

<div class="section-head"><div class="section-title-text">ร้านค้าทั้งหมด</div><div style="font-size:13px;color:var(--subtext);font-weight:600" id="shopCount"></div></div>
<div id="shopsList"><div class="loading">กำลังโหลดร้านค้า...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnBUk0ZKFcwMK0NyYkheux1xPt9bLYhr4",
  authDomain:"nimit-delivery.firebaseapp.com",
  projectId:"nimit-delivery",
  storageBucket:"nimit-delivery.firebasestorage.app",
  messagingSenderId:"233476256130",
  appId:"1:233476256130:web:62ba8f64ad0bf2f92c9f9b"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let allShops = [];
const statusLabel = {pending:"รอรับออเดอร์",accepted:"รับงานแล้ว",picking:"ไรเดอร์กำลังมา",arrived:"ถึงร้านแล้ว",delivering:"กำลังส่ง",done:"ส่งเสร็จแล้ว"};
const statusSteps = ["pending","accepted","picking","arrived","delivering","done"];

const customerData = JSON.parse(localStorage.getItem("customerData")||"{}");
if(customerData.address){
  const a = customerData.address;
  document.getElementById("addressChipText").textContent = a.length>22 ? a.substring(0,22)+"..." : a;
}

function updateCartBadge(){
  const cart = JSON.parse(localStorage.getItem("cart")||"{}");
  let qty = 0;
  Object.values(cart).forEach(function(sc){ (sc.items||[]).forEach(function(i){ qty += i.qty; }); });
  const badge = document.getElementById("cartBadge");
  badge.textContent = qty;
  badge.style.display = qty > 0 ? "flex" : "none";
}
updateCartBadge();

const currentOrderDocs = JSON.parse(localStorage.getItem("currentOrderDocs")||"[]");
if(currentOrderDocs.length > 0){
  onSnapshot(doc(db,"orders",currentOrderDocs[0].docId), function(snap){
    if(!snap.exists()) return;
    const order = snap.data();
    if(order.status === "done" || order.status === "rejected"){
      document.getElementById("activeOrderCard").style.display = "none";
      document.getElementById("orderStatusBtn").style.display = "none";
      return;
    }
    document.getElementById("activeOrderCard").style.display = "block";
    document.getElementById("orderStatusBtn").style.display = "flex";
    document.getElementById("activeOrderId").textContent = order.orderId;
    document.getElementById("activeOrderShop").textContent = order.shopName || "-";
    document.getElementById("activeOrderStatus").textContent = statusLabel[order.status] || order.status;
    var idx = statusSteps.indexOf(order.status);
    var dots = "";
    for(var i=0;i<statusSteps.length-1;i++){
      dots += '<div class="progress-dot '+(i<idx?"done":i===idx?"active-dot":"")+'"></div>';
    }
    document.getElementById("activeOrderProgress").innerHTML = dots;
  });
}

// ADS
async function loadAds(){
  try{
    const snap = await getDocs(collection(db,"ads"));
    const ads = [];
    snap.forEach(function(d){ ads.push(Object.assign({id:d.id},d.data())); });
    if(!ads.length) return;
    document.getElementById("adsSection").style.display = "block";
    var trackHTML = "";
    var dotsHTML = "";
    for(var i=0;i<ads.length;i++){
      var ad = ads[i];
      var inner = ad.imgUrl
        ? '<img src="'+ad.imgUrl+'" style="width:100%;height:100%;object-fit:cover">'
        : '<div class="ad-placeholder"><svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zm-9-7l-3 3.72L7 13l-4 5h18l-5-6.28z"/></svg></div>';
      var caption = ad.caption ? '<div class="ad-caption">'+ad.caption+'</div>' : '';
      var sid = ad.shopId || '';
      var sname = (ad.shopName || '').replace(/"/g,'&quot;');
      trackHTML += '<div class="ad-slide"><div class="ad-card" onclick="selectShop(\''+sid+'\',\''+sname+'\')">'+ inner + caption +'</div></div>';
      dotsHTML += '<div class="ads-dot'+(i===0?' active':'')+'" onclick="goToAd('+i+')"></div>';
    }
    document.getElementById("adsTrack").innerHTML = trackHTML;
    document.getElementById("adsDots").innerHTML = dotsHTML;
    startAdAuto(filteredAds.length);
  }catch(e){}
}

var currentAd = 0, adTimer = null, totalAds = 0;
window.goToAd = function(idx){
  currentAd = idx;
  document.getElementById("adsTrack").style.transform = "translateX(-"+idx+"00%)";
  document.querySelectorAll('.ads-dot').forEach(function(d,i){ d.classList.toggle('active',i===idx); });
};
function startAdAuto(n){
  totalAds = n;
  if(adTimer) clearInterval(adTimer);
  adTimer = setInterval(function(){ goToAd((currentAd+1)%totalAds); }, 3500);
}

// SHOPS
// คำนวณระยะทาง km ระหว่างสองพิกัด
function calcDist(lat1,lng1,lat2,lng2){
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

var userLat=null, userLng=null;

function getUserLocation(){
  return new Promise(function(resolve){
    if(!navigator.geolocation){ resolve(); return; }
    navigator.geolocation.getCurrentPosition(
      function(pos){ userLat=pos.coords.latitude; userLng=pos.coords.longitude; resolve(); },
      function(){ resolve(); },
      {timeout:5000}
    );
  });
}

async function loadShops(){
  await getUserLocation();
  try{
    const snap = await getDocs(collection(db,"shops"));
    allShops = [];
    snap.forEach(function(d){
      var shop = Object.assign({id:d.id},d.data());
      if(userLat && shop.lat && shop.lng){
        shop._dist = calcDist(userLat,userLng,shop.lat,shop.lng);
        shop._fee = shop._dist > 1.5 ? 9 : 0;
      }
      allShops.push(shop);
    });
    renderPopular();
    renderShops(allShops);
  }catch(e){
    document.getElementById("shopsList").innerHTML = '<div class="loading">โหลดไม่ได้ กรุณาลองใหม่</div>';
  }
}

function renderPopular(){
  var popular = allShops.filter(function(s){ return s.isOpen && (s.popular || (s.rating && s.rating >= 4.5)); }).slice(0,8);
  if(!popular.length) return;
  document.getElementById("popularSection").style.display = "block";
  var html = "";
  for(var i=0;i<popular.length;i++){
    var s = popular[i];
    var imgHTML = s.bannerUrl
      ? '<img src="'+s.bannerUrl+'" style="width:100%;height:100%;object-fit:cover">'
      : '<div class="popular-card-placeholder"></div>';
    var sname = s.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    html += '<div class="popular-card" onclick="selectShop(\''+s.id+'\',\''+sname+'\')">'
      +'<div class="popular-card-img">'+imgHTML+'</div>'
      +'<div class="popular-card-body">'
      +'<div class="popular-card-name">'+s.name+'</div>'
      +'<div class="popular-card-meta">'+(s.deliveryTime||'20-30')+' นาที</div>'
      +'</div></div>';
  }
  document.getElementById("popularScroll").innerHTML = html;
}

function renderShops(shops){
  var open = shops.filter(function(s){ return s.isOpen; });
  var closed = shops.filter(function(s){ return !s.isOpen; });
  if(!shops.length){
    document.getElementById("shopsList").innerHTML = '<div class="loading">ไม่พบร้านค้า</div>';
    return;
  }
  var html = '<div class="shops-list">';
  for(var i=0;i<open.length;i++) html += buildShopCard(open[i], false);
  html += '</div>';
  if(closed.length){
    html += '<div class="closed-label">ร้านที่ปิดอยู่</div>';
    html += '<div class="shops-list">';
    for(var j=0;j<closed.length;j++) html += buildShopCard(closed[j], true);
    html += '</div>';
  }
  document.getElementById("shopsList").innerHTML = html;
}

function buildShopCard(s, isClosed){
  var sname = s.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  var onclick = isClosed ? '' : "selectShop('"+s.id+"','"+sname+"')";
  var bannerHTML = s.bannerUrl
    ? '<img src="'+s.bannerUrl+'" style="width:100%;height:100%;object-fit:cover">'
    : '<div class="shop-banner-placeholder"></div>';
  var badgeClass = s.isOpen ? 'badge-open' : 'badge-closed';
  var badgeText = s.isOpen ? 'เปิด' : 'ปิด';
  var avatarHTML = s.avatarUrl
    ? '<img src="'+s.avatarUrl+'">'
    : '<svg viewBox="0 0 24 24"><path d="M20 4H4v2l8 5 8-5V4zm0 4.236l-8 5-8-5V20h16V8.236z"/></svg>';
  var descHTML = s.desc ? '<div class="shop-desc">'+s.desc+'</div>' : '';
  var distHTML = '';
  if(s._dist!=null){
    var dk = s._dist<1?'<1':s._dist.toFixed(1);
    distHTML = '<div class="shop-meta-item"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>'+dk+' กม.</div>';
  }
  var timeHTML = '<div class="shop-meta-item"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>'+(s.deliveryTime||'20-30')+' นาที</div>';
  var ratingHTML = s.rating ? '<div class="shop-meta-item"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>'+s.rating+'</div>' : '';
  var feeHTML = s._fee!=null ? '<div class="shop-meta-item"><svg viewBox="0 0 24 24"><path d="M20 8H4V6h16v2zm-2-6H6v2h12V2zm4 10v8c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2v-8c0-1.1.9-2 2-2h16c1.1 0 2 .9 2 2zm-6 4c0-1.66-1.34-3-3-3s-3 1.34-3 3 1.34 3 3 3 3-1.34 3-3z"/></svg>'+(s._fee===0?'ส่งฟรี':'ส่ง ฿'+s._fee)+'</div>' : '';
  return '<div class="shop-card'+(isClosed?' closed':'')+'" onclick="'+onclick+'">'
    +'<div class="shop-banner">'+bannerHTML
    +'<div class="shop-status-badge '+badgeClass+'">'+badgeText+'</div></div>'
    +'<div class="shop-profile-row"><div class="shop-avatar">'+avatarHTML+'</div></div>'
    +'<div class="shop-info"><div class="shop-name">'+s.name+'</div>'
    +descHTML
    +'<div class="shop-meta">'+distHTML+timeHTML+ratingHTML+feeHTML+'</div>'
    +'</div></div>';
}

window.filterShops = function(){
  var q = document.getElementById("search").value.toLowerCase();
  var filtered = allShops.filter(function(s){
    return s.name.toLowerCase().indexOf(q) > -1 || (s.desc||'').toLowerCase().indexOf(q) > -1;
  });
  renderShops(filtered);
};

window.selectShop = function(id, name){
  if(!id) return;
  localStorage.setItem("selectedShopId", id);
  localStorage.setItem("selectedShopName", name);
  window.location.href = "menu.html";
};

loadAds();
loadShops();
</script>
</body>
